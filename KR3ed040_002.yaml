body:
  text: 卷二脾胃脈弦洪緩而沉按之中之下得一澀其證四肢滿悶肢節燥痛難以屈伸身體沉重心煩不安忽肥忽瘦四肢懶惰口失滋味大小便清利而數或上飲下便或大便澀滯不行一二日一見夏月飧泄米穀不化或便後見血膿血胸滿短氣咽膈不通安臥嗜睡無力不思飲食調中益氣湯升麻二分黃耆一錢甘草五分蒼朮四分木香一分人參五分柴胡二分陳皮二分如時濕燥熱是下元蒸蒸發也加生地黃柏如大便虛坐不得或大便了而不了腹常逼迫血虛澀也加歸身又治氣血俱虛頭痛加川芎二分蔓荊子三分細辛二分上水二盞煎服養胃湯治脾胃虛寒嘔逆噁心腹脅脹滿腸鳴瀉泄或外感寒熱如瘧骨痛藿香厚朴半夏茯苓各一兩草果附子甘草陳皮人參白朮各七錢腹痛加肉桂吳茱萸上每服一兩水二盞薑五片煎白朮和胃丸治久病不能食而臟腑或結或溏此胃氣虛弱也常服則和中理氣消痰去濕和脾胃進飲食厚朴薑製半夏薑製各一兩白朮一兩二錢陳皮八錢檳榔枳實各二錢半木香一錢人參七分甘草炙二錢上為細末薑汁浸餅丸如梧子大每服三十丸空心溫水送下思食調中丸治脾胃久弱三焦不調氣滯胸膈痞悶不食嘔逆噁心或吐痰水神麯炒麥芽炒陳皮去白半夏曲烏藥各一兩檳榔人參各七錢白朮一兩半木香沉香各五錢上為末蜜調白麵打糊為丸如梧子大每三十丸米飲送下治中湯治脾胃不和嘔逆霍亂中滿虛痞或泄瀉人參甘草炙乾薑白朮青皮陳皮半夏各等分丁香減半嘔吐不已加藿香倍加半夏上每服三錢水一鍾薑三片煎胃風湯治虛症能食麻木牙關緊急搐目肉蠕胃中有風獨面腫或四肢腫蔓荊子一分柴胡藁本各三分升麻二分麻黃五分不去節乾生薑二分草豆蔻黃柏各三分羌活三分歸身蒼朮葛根各一錢白芷一錢二分甘草炙一錢半上水二盞棗四枚分作二服煎平胃散治脾胃不和不進飲食常服暖胃消痰蒼朮米泔浸八兩厚朴薑製陳皮各五兩甘草炒三兩上每服一兩薑三片棗二枚水煎一方治脾胃不和飲食後倒飽嘈心痞氣此藥主之開鬱化痰進食蒼朮一錢白朮八分半夏一錢茯苓八分甘草五分厚朴七分神麯六分麥芽八分陳皮山楂各八分黃連枳實桔梗各七分上水一鍾半生薑三片棗二枚煎香砂和中湯和脾胃療心腹氣痛婦人尤宜藿香蒼朮各一錢半砂仁厚朴薑炒陳皮茯苓半夏薑製香附青皮各一錢甘草五分木香磨水三匙有郁加梔子仁上水一盞半薑三片煎六君子湯治脾臟不和不進飲食上燥下寒服熱藥不得者人參白朮各一兩橘紅半夏枳殼甘草炙各五錢每服一兩薑七片棗二枚煎參苓白朮散凡大病後調助脾胃此藥最好退虛熱方見泄門八珍湯補脾陰不足和血氣理脾胃當歸川芎地黃芍藥人參茯苓甘草砂仁各等分每服五錢薑七片棗一枚煎加味平補枳朮丸調中補氣消痞清熱化食白朮炒四兩白芍一兩陳皮一兩五枳實炒二兩黃連薑炒一兩人參五錢木香五錢神麯炒一兩麥芽曲炒一兩梔子炒五錢半夏曲一兩上為末煮荷葉濃汁煮糯米糊為丸梧子大每七八十丸米湯溫水任下有痰用薑湯下健脾丸治心胸痞悶飲食停滯或作酸噫氣白朮炒五兩陳皮半夏薑製各三兩神麯炒山楂蒸去核歸身酒洗白芍酒炒白茯苓各二兩川芎香附童便炒黃連薑炒各一兩五錢枳實炒甘草各一兩上為末荷葉煮汁煎糯米糊為丸白湯送下六七十丸一方有蒼朮木香順氣丸治脾胃飲食所滯生痰上攻氣喘不寧堵塞不通吐痰不絶胸膈脹滿氣滯不散風痰壅盛氣促不安不問一切老少年深日淺受此患者服之即效氣虛弱喘嗽如緑豆大服一丸其效最大廣木香一兩不見火大川烏火炮去皮臍七錢三奈五錢巴豆七錢去皮油取霜上為末酒煮肥棗去皮核搗如泥丸黃豆大每服一丸嚼白蘿蔔送下再吃蘿蔔壓之有面糊為丸一方加丁香三錢川芎五錢蘿蔔子七錢香殼丸消食化氣醒脾去積消痰青皮陳皮各四兩蘿蔔子炒木香三稜莪朮神麯麥芽各一兩枳殼二兩半夏二兩半香附一兩半檳榔山楂草果各一兩枳實麩炒二兩巴豆二十粒膈痛加乳香沒藥各二錢上為末水丸加生薑汁二兩量老幼虛實用溫水送下十九至二三十丸止一方治傷酒食心內不快滿悶陳皮半夏茯苓甘草神麯麥芽白豆蔻砂仁人參白朮酒傷加乾葛上水一盞薑三片煎止麻清痰飲治口舌麻木涎及嘴角頭面亦麻或嘔吐痰涎或頭眩眼花噁心並遍身麻木黃連半夏薑製七次栝蔞仁黃芩茯苓桔梗枳殼橘紅鹽水洗天麻各一錢二分細辛甘草各五分南星薑礬皂角煮過一錢血虛加當歸氣虛加人參各一錢亦有十指麻木胃中有濕痰死血加蒼朮白朮少佐熟附子行經中死血者四物湯加桃仁紅花各八分韭汁三四匙上水二鍾薑三片煎八分加竹瀝半酒鍾薑汁三四匙食遠服忌生冷魚腥發風發熱之物健脾化痰開鬱行氣丸又兼四物養脾陰不足南星薑煮大半夏薑礬煮各四兩陳皮四兩蒼朮泔浸炒白朮炒芍藥炒各四兩香附米童便浸炒梔子炒栝蔞仁炒茯苓貝母去心各三兩枳實神麯炒山楂去核地黃酒歸身酒川芎黃連炒甘草炒黃芩炒各二兩上蒸餅丸溫水送下藿香安胃湯治胃氣不和嘔吐不止藿香半夏厚朴蒼朮各一錢陳皮二錢甘草六分上水一盞半薑五片棗二枚煎烏沉湯治一切氣除一切冷調中補五臟益精壯陽道暖腰膝去邪氣治吐瀉轉筋癥瘕疼痛風水毒冷風麻痹又主中惡心腹痛膀胱腎間冷氣攻衝背膂俯仰不利婦人血氣攻擊心腹撮痛並治之天台烏藥十兩沉香五兩人參三錢甘草四錢半上為細末每服二錢用薑湯入鹽少許食前調服益脾散和胃進食白茯苓人參草果煨木香煨甘草炙陳皮厚朴紫蘇各等分上為末大人三錢小兒一錢薑棗煎服歸脾湯治思慮過度勞傷心脾健忘怔忡解鬱養脾陰白朮茯神黃耆龍眼肉酸棗仁炒各一兩人參木香各五錢炙甘草二錢半上銼每服四錢薑三片棗一枚煎平胃散治脾胃不和嘔吐酸水胸膈痞滯不美飲食並治厚朴去皮陳皮存白洗生薑甘草炙各三兩茅山蒼朮米泔浸一宿去皮曬乾五兩南京小棗二百枚去核上用水五升煮乾搗作餅子曬乾再碾為末每服二錢鹽湯點服如泄瀉加薑五片烏梅二個去核水煎服加料平胃散治脾胃不和不思飲食心腹脅肋脹滿刺痛口苦無味胸滿短氣嘔噦噁心噫氣吞酸面色痿黃肌體瘦弱怠惰嗜臥體重節痛常多自利或發霍亂及五噎八痞膈氣反胃並宜服之厚朴制橘皮各五兩蒼朮泔浸炒八兩甘草茯苓各二兩人參一兩上銼水二鍾生薑三片棗一枚煎至一鍾去滓溫服一方如棗肉丸小豆大每五十丸薑湯下空心常服調氣暖胃化宿食消痰飲闢風寒冷濕四時非節之氣調胃散治陰陽氣不和三焦痞膈五勞七傷山嵐瘴氣八般瘧疾四時傷寒頭目肢節疼痛腹脹滿嘔吐噁心痰嗽手足虛腫五種膈氣噎塞寒熱水瀉諸痢脾胃不和飲食減少並治藿香甘草炙陳皮去白厚朴去皮薑製半夏曲每一兩用生薑三兩半制上五味各二兩同為細末每服四錢生薑三片煎食前服藿香安胃散治脾胃虛弱不能飲食嘔吐不時腐氣藿香丁香人參各二錢半橘紅五錢上銼水二鍾生薑三片煎至一鍾不拘時溫服氣滯手脈沉便知是氣沉極則伏澀弱難治其或沉滑氣兼痰飲又曰沉弦細動皆氣痛症心痛在寸腹痛在關下部在尺脈象顯然怒則氣上喜則緩驚則亂恐則下勞則耗悲則急思則結皆能致疾氣無補法亦有當補者蘇子降氣湯治虛陽上攻氣不升降上盛下虛痰涎壅盛蘇子一錢五分厚朴陳皮半夏官桂前胡各一錢甘草五分上水一鍾半薑三片煎流氣飲子治男子婦人五臟不和三焦氣壅心胸痞悶咽塞不通腹脅膨脹嘔吐不食及上氣喘急咳嗽痰盛面目浮四肢腫大便祕結小便不通及治憂思太過陰陽之氣鬱結不散壅致成痰又治腳氣腫痛喘急腹脹大便不通及氣攻肩背脅肋走注疼痛紫蘇葉青皮當歸芍藥烏藥茯苓桔梗半夏川芎黃耆枳實各七分防風甘草陳皮木香連皮大腹子各五分每七錢薑三片棗二枚煎服橘皮一物湯治諸氣攻刺及感冒寒暑濕初傷通用凡酒食所傷中脘痞塞悶亂嘔吐吞酸噯氣少食橘皮一兩洗淨新汲水煎服蟠蔥散治男婦脾胃虛冷氣滯不行攻刺心腹痛連胸脅膀胱小腸疝氣婦人血氣刺痛延胡索肉桂乾薑炮各二兩甘草炙砂仁蒼朮炒各五錢丁皮檳榔各四兩蓬朮三稜茯苓青皮各六兩上為末每服二錢水一鍾蔥白一枝煎空心熱服三因七氣湯治喜怒憂思悲恐驚之氣結成痰涎狀如破絮或如梅核在咽喉之間咯不出咽不下此七情所為也或中脘痞滿氣不舒快或痰涎壅盛上氣喘急或因痰飲所阻嘔逆噁心並亦服之半夏五兩茯苓四兩厚朴三兩紫蘇梗二兩每服四錢水一鍾半薑七片棗二枚煎若因思慮過度小便白濁此湯下青州白丸子最妙若婦人惡阻病尤宜服之但半夏必薑製一方七情所傷中脘不快氣不升降腹脅脹滿用香附子炒半斤陳皮六兩甘草一兩尤快亦治俗名氣眼風加桔梗鬱金梔子於七氣湯中治氣六合湯治亡血後七情所傷或婦人産後月信後著氣當歸川芎白芍地黃木香檳榔上水一鍾半煎陰虛氣滯者去木香檳榔加玄參黃柏枳殼分心氣飲治男子婦人一切氣不和多因憂愁思慮忿怒傷神或臨食憂戚或事不遂意使抑鬱之氣留滯不散停於胸膈之間不能流暢致心胸痞悶脅肋虛張噎塞不通噫氣吞酸嘔噦噁心頭目昏眩四肢倦怠面色痿黃口苦舌乾飲食減少日漸羸瘦大腸虛祕或因病後虛痞不思飲食並治之木通赤芍赤茯苓官桂半夏桑白皮大腹皮陳皮青皮甘草羌活各二兩紫蘇四兩每服一兩水二鍾薑三片棗二枚加燈心十五莖煎一方治實熱在內相火上衝有如氣滯知母黃連黃柏黃芩枳殼上水一鍾半煎撞氣阿魏丸治五種噎疾九種心痛痃癖氣塊冷氣攻刺腹痛腸鳴嘔吐酸水丈夫疝氣婦人血氣茴香炒青皮甘草炙陳皮蓬朮川芎各一兩生薑一兩鹽五錢醃一宿胡椒白芷肉桂砂仁丁香炒各五錢阿魏一錢五分酒浸為糊上為末用上阿魏麵糊丸如芡實大每藥一斤用硃砂七錢為衣每服三五粒丈夫氣痛炒薑鹽湯下婦人血氣痛醋湯下東垣木香順氣散治濁氣在上則生䐜脹常服寬中利膈絶妙木香三分厚朴四分青皮益智陳皮茯苓澤瀉半夏吳茱萸各五分當歸五分升麻柴胡各一分草蔻炒三分蒼朮三分上水二鍾生薑五片煎木香順氣丸治胸膈噎塞氣不升降氣滯不行腹中水聲嘔吐痰逆不思飲食寬中利膈好黑牽牛頭末十二兩廣木香一兩補骨脂炒蓽澄茄各四兩檳榔酸粟米飯裹濕紙包火中煨令紙焦去飯四兩上為末水丸緑豆大每三十丸茶湯溫水任下一方無檳榔蓽澄茄加大腹皮蘿蔔子香附子經驗調氣湯調順榮衛通行血脈快利三焦安和五臟諸氣痞滯不通胸膈膨脹口苦咽乾嘔吐不食肩背腹脅走注疼痛及喘急痰嗽面目虛浮四肢腫滿大便祕結水道赤澀又治憂思太過怔忡鬱積又治腳氣風濕聚結腫滿喘滿脹急人參赤茯苓木瓜麥門冬白朮白芷各二兩半夏陳皮厚朴薑製青皮甘草香附炒紫蘇各一斤沉香六兩枳殼四兩草果大黃煨各二兩肉桂不見火蓬朮大腹皮丁皮檳榔各二兩木香六兩木通治傷寒頭疼加蔥白大便自利加粳米去大黃婦人血氣癥瘕加艾醋上水二鍾薑三片棗二枚煎每服一兩正氣天香散治心疼腹痛婦女血氣痛尤宜烏藥一錢半香附六錢陳皮紫蘇乾薑各六分上水煎服升陽順氣湯治忿怒傷肝思慮傷脾悲哀傷肺以致各經