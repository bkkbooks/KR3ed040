水而出吞酸者濕熱鬱於肝而出伏於肺胃之間必用糲食蔬菜自養加味平胃散治吞酸或宿食不化蒼朮不制陳皮厚朴甘草神麯炒麥芽炒每五錢薑三片煎一方治鬱積酸陳皮半夏茯苓各一兩吳茱萸炒一兩黃連炒一兩半蒼朮一兩枳實五錢炒上末蒸餅丸梧子大每二三十丸食遠服冬月倍茱萸夏月倍黃連一方治噯氣此胃中有鬱火膈上有稠痰故也南星半夏軟石膏香附梔子炒或作丸或作湯俱可服一方治吐清水蒼朮土炒茯苓滑石煅白朮炒陳皮水煎服痞病痞者皆土之病也與脹滿有輕重之分痞則內覺痞悶而外無脹急形者是也有中氣虛弱不能運化精微為痞者有飲食痰積不能施化為痞者有濕熱太甚為痞者一方治稟受充實面蒼骨露氣實之人心下痞者枳實黃連青皮陳皮枳殼上為末每服三錢燈心湯下一方稟受素弱轉運不調飲食不化而心下痞者白朮山楂去核神麯麥芽陳皮上為末每服三錢米飲調下一方治肥人心下痞者乃是鬱熱在中焦枳實黃連葛根升麻上為末每服三錢薄荷湯下一方治食後感寒飲食不化心下痞者藿香豆蔻吳茱萸砂仁上為末每服三錢薑湯下一方治挾血成窠囊心下痞者桃仁紅花香附大黃上為末每服四錢酒下補中益氣湯加芍藥黃連各一錢治內傷心下痞瞀悶者如痞腹脹加枳實三分薑朴七分木香砂仁各三分見內傷門枳實消痞丸枳實黃連各五錢乾生薑二錢半夏曲三錢厚朴四錢人參二錢甘草炙二錢白朮三錢茯苓麥芽各二錢為末蒸餅丸每五十丸溫水下咳逆氣逆也氣自臍下直衝上出於口而作聲之名也古謂之噦今謂之厄乃胃寒所生寒氣自逆而厄上也有痰有氣虛有火有因飲食太過填塞胸中而氣不得升降者或有痰閉於上火起於下而氣不得伸越者又有傷寒熱病陽明內實過期失下清氣不得升濁氣不得降以致氣不宣通而發厄者此皆實症也一方治痰咳陳皮半夏上薑五片水煎服或以人參蘆煎湯吐之人參白朮湯治氣虛不足咳逆人參黃芩柴胡乾薑梔子仁甘草炙各兩半白朮防風五味子半夏泡上銼每服四錢薑三片煎服一方治陰火咳逆黃連黃柏滑石上用水煎服益原散亦可一方治咳逆自利滑石甘草黃柏炒白芍人參白朮陳皮加竹瀝水煎服橘皮竹茹湯治吐利後胃熱咳逆橘皮一兩竹茹一兩半甘草炙二兩棗子二十個生薑半兩人參半兩上水十碗煎至三碗作三次熱服消渴上消者肺也多飲水而少食大小便如常中消者胃也多飲食而小便赤黃下消者腎也小便頻數濁淋如膏之狀三消皆禁用半夏脈洪大者生微小者死治方黃連末天花粉末人乳汁藕汁生地黃汁上將三汁佐以薑汁入蜜為膏和二末徐徐留舌上以滾白湯少許送之能食易飢者加軟石膏黃芩小便頻數或如膏者加五味子知母黃柏玄參若泄瀉先用白朮白芍藥炒為末調服後服此藥一方用繅絲湯飲之如無繅絲湯以繭殼煮湯代之此物屬火有陰之用能瀉膀胱中相火引氣上潮於口天花粉消渴中神藥也人參白虎湯治上消見傷寒門豬肚丸治中消黃連五兩麥冬知母栝蔞各四兩茯神四兩上為末入雄豬肚內縫之蒸熟乘熱於石臼內杵爛如干加煉蜜為丸梧子大每服百丸食後米飲下可以清心止渴調胃承氣湯治中消大黃四兩去皮清酒洗甘草二兩炙芒硝半升上銼每服臨期斟酌多少先煮二味熟去渣下芒硝再煮二三沸以利為度未利再服六味地黃丸治下消見虛損門栝蔞丸治消渴用栝蔞根薄切用人乳汁拌蒸竹瀝拌曬為末煉蜜為丸彈子大噙化或丸小丸每服百丸米飲下忍冬丸治消渴既愈之後須預防發癰疽之患用忍冬草不拘多少根莖花葉皆可用置瓶罐內用無灰好酒浸以粳火煨一宿曬乾入甘草少許研為細末以所浸酒打麵糊為丸梧子大每服一百丸溫酒米飲任下麥門冬飲子治膈消胸滿心煩津液短少消渴五味子五分知母一錢甘草炙三分栝蔞仁五分人參一錢乾葛五分生地黃八分茯苓七分麥冬一錢上水二鍾竹葉十四片煎一鍾溫服清心連子飲治渴而小便濁或澀見白濁門六一散又名神白散治真陰素被虛損多服金石等藥或嗜炙爆咸物遂成消渴用溫水調服或大渴飲冷者新汲水調尤妙三黃丸治男子婦人五勞七傷消渴不生肌肉婦人帶下手足發寒熱者春三月黃芩四兩大黃二兩黃連四兩夏三月黃芩六兩大黃一兩黃連一兩秋三月黃芩六兩大黃二兩黃連三兩冬三月黃芩二兩大黃五兩黃連三兩上三味隨時加減為細末煉蜜丸如大豆大每服五丸日三服不去加七丸服一月愈加減錢氏白朮散治消渴不能食人參白朮白茯甘草炙枳殼炒各半錢藿香一錢乾葛二錢木香五味子柴胡各三分上作一服水煎服茯菟丸治三消渴通用菟絲酒浸十四兩北五味子七兩白茯苓五兩石蓮肉三兩上為末用山藥六兩為末作糊為丸梧子大每服五十丸米飲下王泉丸治消渴小便頻數麥冬去心人參茯苓去皮黃耆半生半蜜炙烏梅去核甘草各一兩栝蔞根乾葛各一兩半上為末煉蜜丸彈子大每一丸溫湯嚼下傷食傷食惡食胸中有物宜導痰補脾用二陳湯加白朮山楂川芎蒼朮服之右手氣口脈必緊盛胸膈痞塞噫氣如敗卵臭亦有頭痛發熱但身不疼傷食必惡食心口按之必刺痛連實平胃散治傷食發熱困倦心口按之刺痛服之立效黃連枳實山楂神麯蒼朮厚朴陳皮甘草上銼水二鍾煎八分通口服如虛弱加白朮甚則加人參枳朮丸治痞消食強胃白朮去梗炒四兩枳實去穰麩炒二兩上為末荷葉包燒糯米飯研為糊丸如桐子大每服五七十丸白湯下此藥久服能使人胃氣強實雖過食而不能傷也若加陳皮一兩名陳皮枳朮丸治老幼元氣虛弱飲食不消或臟腑不調心下痞悶若加陳皮一兩酒浸炒黃連一兩名橘連枳朮丸補脾和胃瀉火消痰若加半夏一兩名半夏枳朮丸治因冷食內傷若加炒神麯炒麥芽面各一兩名曲糵枳朮丸治勉強多食致心腹滿悶不快若加木香一兩名木香枳朮丸破滯氣消飲食開胃進食若加黃芩四兩酒炒大黃煨神麯炒陳皮各二兩名二黃枳朮丸治傷肉食濕面辛辣味厚之物填塞悶亂不快以蒸餅為丸各量所傷服之加味二陳湯治傷食惡食胸中有物宜導痰健脾二陳湯加白朮山楂川芎蒼朮水煎服保和丸治食積脾胃虛者以補藥下之山楂蒸去核二兩神麯炒半夏茯苓各一兩蘿蔔子炒陳皮連翹各五錢上為末神麯糊為丸加白朮二兩名大安丸備急丸治飲食過多心腹脹滿或疼痛皆治大黃乾薑巴豆去皮油各一兩煉蜜丸搗千杵小豆大量大小人與之酒下葛花解酲湯治酒客病令上下分消其濕又治飲酒太過嘔吐痰逆心神煩亂胸膈痞塞手足戰搖飲食減少小便不利白豆蔻砂仁葛花無以葛根代各五錢木香五分青皮三分陳皮白茯豬苓人參各一錢半白朮神麯炒澤瀉乾生薑各一錢上為末每三錢白湯調服一方治心腹膨享南星薑製一兩五錢半夏栝蔞仁研一兩半香附便炒一兩黃連薑炒三兩礞石硝煅蘿蔔子連翹各半兩麝香少許陳皮五錢上為末神麯糊丸溫水下三四十丸丁香爛飯丸治傷食又治卒心痛丁香甘草各二錢砂仁二錢益智仁三錢香附五錢甘松三錢丁香三稜木香廣朮炮各錢半上為末湯浸蒸餅丸每三十丸白湯下木香當歸散實脾順氣消食川芎當歸人參官桂三稜炮麥芽炒乾薑小茴炒木香莪朮陳皮甘草神麯枳殼大便祕倍加枳殼檳榔青皮厚朴上水二鍾薑三片棗二枚煎食遠溫服渣再煎神妙列仙散治飲酒所傷以致遍身疼痛腰腳痠跛手足頑麻胃脘疼痛胸膈心下滿悶肚腹膨脹嘔吐瀉痢及酒停久成一應積聚黃疸熱鼓並皆治之木香沉香各一錢茴香炒檳榔各二錢萹蓄三錢大黃焙一兩麥芽一兩半瞿麥五錢上為末每服三錢或五更時熱酒調下仰面臥叉手胸前至天明取下惡物小便如血忌腥冷硬物米粥調理阿魏丸治脾胃怯弱過食肉面生冷瓜果之物停滯中焦不能克化以致心腹刺痛脹悶嘔吐不食或利或祕並皆治之百草三錢巴豆十四個去油阿魏酒浸化官桂蓬朮三稜煨麥芽炒神麯炒青皮陳皮蘿蔔子白朮乾薑各五錢木香一錢上為末糊丸緑豆大每二十丸傷面麵湯下傷果物麝香湯下內傷補中益氣湯治形神勞役或飲食失節勞倦虛損身熱而煩脈洪大而虛頭痛而惡寒而渴自汗無力氣高而喘黃耆一錢半人參甘草各一錢白朮歸身柴胡升麻陳皮各五分渴加葛根嗽加麥冬五味子如煩不止加生地芍藥上作一服午前稍熱服一方加黃柏三分紅花三分升陽順氣湯治因飲食不節勞役所傷腹脅滿悶短氣遇春則口無味遇夏雖熱猶寒飢常如飽不喜食冷升麻柴胡各一錢黃耆一兩半夏三錢甘草五分陳皮人參神麯歸身各一兩黃柏五分草豆蔻二錢每服三五錢薑三片水煎服參朮調中湯瀉熱補氣止嗽定喘和脾胃進飲食黃耆四分桑白皮五分甘草人參茯苓各三分五味子二十粒白朮五分地骨皮麥門冬陳皮各二分青皮一分水煎服升陽益胃湯治脾胃虛弱嗜臥怠惰四肢不收時值秋令行濕熱少退體重節痛口舌乾澀飲食無味大便不調小便頻數食不消兼見肺病灑灑惡寒慘慘不樂面色惡而不和乃陽氣不伸故也柴胡白朮茯苓渴去之澤瀉各三錢去毛羌活獨活防風各五錢以秋旺故以辛溫泄之人參甘草半夏各一兩黃耆二兩黃連一錢陳皮四錢白芍炒五錢上每服三五錢薑三片棗二枚煎早飯後溫服加味補中益氣湯治一切中氣不足脾胃弱下元虛腰膝軟弱夜有房勞服此效人參黃耆蜜炙白朮炒杜仲炒牛膝白芍炒各一錢甘草炒六分當歸酒浸八分升麻三分陳皮七分柴胡五分五味子九粒黃柏炒一錢枸杞子一錢空心水煎服如夢遺加知母牡蠣各一錢腹脹加半夏厚朴咳嗽加知母麥冬各八分泄瀉加肉豆蔻乾薑各七分嘔逆噁心加藿香半夏癍疹有色點而無頭粒者謂之癍有頭粒而隨出即沒沒而又出者謂之疹癍屬風熱挾痰而作疹屬熱與痰在肺凡丹從四肢入腹者死又云癮疹多屬脾隱隱然在皮膚之間故言癮疹也發則多癢或不仁者是兼風兼濕之殊色紅者兼火化也熱微者赤癍出熱甚者黑癍出赤癍九生一死黑癍十死一生通聖散癍疹通治消息隨宜防風川芎當歸麻黃薄荷連翹芒硝大黃白芍各五錢黃芩石膏桔梗各一錢滑石三兩荊芥梔子白朮各三錢甘草二兩上銼水煎服身疼加蒼朮羌活痰嗽加半夏消風散治丹疹屬血風血熱荊芥穗甘草炙陳皮去白厚朴各五錢白殭蠶炒蟬蛻去土炒人參茯苓防風芎藭藿香羌活上為末每服三錢荊芥茶清調下化癍湯治傷寒汗吐下後癍發脈虛人參石膏知母甘草白朮上煎時時服一方加玄參又方用黃瓜水調伏龍肝服去紅點癍好調中湯治內傷外感而發陰癍此無根失守之火聚於胸中上熏於肺傳於皮膚如蚊蟲咬形狀而非錦紋也蒼朮一錢半陳皮一錢砂仁藿香芍藥炒甘草炙桔梗半夏白芷羌活枳殼各一錢川芎半錢麻黃桂枝各半錢上薑三片水煎服消毒犀角飲子治癍及癮疹牛蒡子六錢荊芥三錢防風三錢甘草二錢上水煎服玄參升麻湯治癍在身汗下吐後毒不散表虛里實發於外甚則煩躁譫妄玄參升麻甘草各等分水煎服一方傷寒陽症發癍有四性溫毒發癍至重紅赤為胃熱也紫黑為胃爛也一則下早一則下晚乃外感熱病發癍也以玄參升麻白虎等湯合服之白虎湯見傷寒門有內傷發癍者胃氣極虛一身火遊行於外所致宜補以降之黃疸不必分五疸同是濕熱面黑黃色而渴者不治茵陳五苓散黃芩黃連山梔子茵陳豬苓澤瀉蒼朮青皮龍膽草各等分有積加莪朮三稜砂仁陳皮神麯上水二盞煎胃苓湯治疸好滑石蒼朮陳皮厚朴甘草白朮官桂茯苓豬苓澤瀉上清水煎服黃疸方真阿魏黑如糖餳者是每服五分酒磨下不過二服又方地骨皮四兩木通一兩車前子四兩研爛上三味用陰陽水各一碗煎露一宿空心服搐鼻法治黃疸遍身如金黃色瓜蒂二錢母丁香大黃一兩醋炒黍米五分赤小豆五分為細末每夜兩鼻搐之便睡次日取下小便愈泄瀉有濕有火有氣虛有痰積食積胃苓湯治感暑濕夾食泄瀉煩渴兼食瓜果太多肚腹疼痛作泄蒼朮厚朴薑製陳皮甘草白朮茯苓豬苓澤瀉各一錢肉桂五分鹽少許上水一鍾半煎一方治濕泄水泄腹不痛是也豬苓澤瀉白朮蒼朮赤茯苓各等上水一鍾半煎服一方治火泄腹痛泄水腸鳴痛一陳瀉一陳是也即上方加黃芩是一方治食積泄瀉痛甚而泄泄後痛減者是陳皮半夏茯苓甘草澤瀉厚朴蒼朮白朮山楂神麯上水一鍾半煎一方加大黃作丸服下之一方治氣虛泄完穀不化者是人參白朮白芍升麻甘草上水煎服一方治痰積泄或泄或不泄或多或少者是海粉青黛黃芩上為末神麯糊丸梧子大每二三十丸薑湯送下益元散治暑濕泄瀉及大人小兒痢疾俱好加紅曲丸治紅痢去紅曲加乾薑薑汁丸治嘔吐瀉泄似霍亂者方見中暑門一方治暴泄不止小便不通用車前子炒為末每服二錢米飲調下其根搗汁服止泄升陽除濕湯治脾胃虛弱不思飲食腸鳴腹痛泄瀉無度小便黃色四肢困弱升麻柴胡防風神麯澤瀉豬苓各五錢蒼朮一兩陳皮甘草大麥芽面各二錢上作十貼水煎飯後熱服胃寒腸鳴加益智仁半夏薑煨三片棗一枚煎非腸鳴不用益智一方加羌活白朮治年久脾泄方白朮一兩茯苓八錢人參三錢甘草三錢木香二錢蓮肉四兩去心微炒砂仁二錢上為末以陳糯米一升炒熟為末拌勻或蜜或沙糖調服雖年久半料即愈一方治泄白朮蒼朮各一錢二分赤茯苓一錢半澤瀉陳皮各一錢豬苓厚朴各八分甘草黃連各五分半夏一錢肉桂三分腹痛加白芍夏月加黃芩上水一鍾半薑三片煎參苓白朮散治脾胃虛弱泄瀉石蓮肉薏苡仁砂仁桔梗各半斤白扁豆薑汁炒十二兩白茯苓人參甘草炙白朮山藥各一斤上為末每服三錢棗湯調下一方治泄瀉用五倍子為末白湯調服又方治水泄無度乾薑末米粥調服二錢柴苓湯治泄瀉發熱又方治傷寒泄瀉者好天仙子治腸滑久瀉不止大人五分小人二分和麵作焦餅服極收澀桂苓白朮散治暑渴濕熱吐瀉轉筋腹痛小兒亦可服官桂白朮豬苓各五錢茯苓澤瀉各一兩甘草炙石膏寒水石各二兩滑石四兩上為末每服二錢熱湯或新汲水或薑湯俱可調服一方治大小人泄瀉及各色痢疾風濕疼痛俱可貼亦貼咳嗽蒼朮防風白芷羌活當歸川芎官桂杏仁苦參各五錢用真香油一斤四兩炸上藥黃色稱淨油一斤入丹半斤熬用加乳香沒藥各三錢收用一方治年老虛弱少年久泄虛弱甚宜服亦止久痢肉豆蔻煨白朮土炒茯苓各一錢甘草炙五分木香二分訶子煨八分人參七分陳皮七分神麯五分上水二鍾煎又方蓮肉焙山藥炒芡實面雞頭粉白朮土炒上為末入沙糖隨意干食封臍法治大人小兒久瀉不止及自汗不止五倍子為末入麝香少許封於臍中痢疾初得元氣未虛必推蕩之此通因通用之法脈沉小者易治大數者難治又脈滑大浮弦急死沉細無害小承氣湯治痢疾初發積氣盛腹痛難忍或作脹悶裡急後重數至圊而不能便窘迫之甚五日後氣虛及年老衰弱者不宜下大黃三錢厚朴二錢枳實一錢五分水煎食前熱服以利為度未利再服加減胃苓湯治暴痢赤白相雜腹痛裡急後重厚朴蒼朮澤瀉茯苓豬苓各八分陳皮甘草白朮黃連各一錢木香三分檳榔五分上水二鍾煎服一方治赤痢生地黃柏芍藥地榆白朮各等分上水煎如腹痛加枳殼厚朴後重加滑石木香檳榔熱疼甚加沒藥一方治白痢蒼朮白朮神麯茯苓地榆甘草各等分上水煎服如腹痛加枳殼厚朴後重加木香檳榔升陽除濕湯加木香治痢如魚凍者最效見濕門益元散治中暑毒痢又治小兒痢效參苓白朮散治久痢及脾胃虛弱不進飲食或嘔吐泄瀉開胃進食人參茯苓白朮白扁豆山藥蓮肉砂仁桔梗甘草薏苡仁噤口痢加石蓮肉同前藥為末陳米湯調服胃風湯治風入腸胃作痢或赤或白或如豆汁或痢久人弱脈虛色如陳腐將危者亦能救治人參白朮茯苓川芎芍藥當歸羌活防風黍米上水二鍾煎一方有官桂無羌活防風腹痛加木香加味四物湯治下痢純血久不愈屬陰虛當歸川芎芍藥生地槐花炒黃連桃仁各等分上水煎服人參敗毒散治熱加黃芩噤口痢加陳倉米蓮肉七枚見傷寒門一方治痢劫劑用生石灰枯白礬各等分麵糊丸黃豆大空心三丸白痢燒酒送下紅痢甘草湯下一名白玉丸勝金丹治痢乾薑黃蠟各等分化蠟為丸芥子大每服二七丸白痢酒送下紅痢井水下一方治噤口痢人參二分黃連二分薑炒濃煎細細呷之但一呷下咽即食紫金錠治赤痢涼水磨下白痢薑湯磨下垂死者以水磨即愈劉草窗治虛弱人不進飲食者人參三錢白朮二錢半茯苓二錢芍藥一錢半神麯七分升麻五分蒼朮一錢上水煎服後重加木香三分檳榔七分黃連七分澤瀉六分甘草五分防風一錢當歸一錢滑石五分下痢大孔痛甚黑礬炒布包熏數次妙一方治痢久腸滑米殼生石榴皮甘草蘿蔔子各等分上水一鍾煎真人養臟湯治大人小兒冷熱不調下痢赤白或如膿血魚腦髓裡急後重臍腹㽱痛脫肛墜下酒毒便血並治之米殼去蒂蜜炙三兩六錢人參當歸各六錢甘草一兩八錢肉桂八錢訶子一兩二錢木香三兩四錢不見火白朮炒八錢肉豆蔻麵裹煨五錢白芍一兩六錢上水二鍾煎臟寒加附子導氣湯下痢膿血裡急後重開胸膈進飲食破滯氣散內熱芍藥一兩當歸五錢大黃二錢黃連一錢黃芩二錢木香檳榔各一錢上水二鍾煎木香檳榔丸治痢疾裡急後重開胸膈破滯氣散內熱進飲食木香檳榔青皮陳皮廣朮枳殼黃連黃柏大黃各五錢黑牽牛香附米各二兩上為末水丸梧子大每六七十丸溫水送下一方有三稜黃芩當歸百中散治一切痢疾米殼三兩水浸少頃提起去漠後用白蜜炒黃色厚朴切碎以薑汁拌勻炒令香熟淨稱三兩同為細末每服一茶匙以清米湯少加蜜調下調中湯治痢不拘新久紅白雜下裡急後重腹痛蒼朮白朮當歸白芍滑石青皮黃芩黃連薑炒生地各一錢二分檳榔六分上水二鍾煎服升陽除濕湯治痢疾久而不愈陽氣下陷見泄門六陳湯劫劑青皮陳皮乾薑甘草烏梅米殼上水煎空心服一方治寒痢青色為寒用切乾薑如豆大米飲服六七十粒日三次用一方治血痢神妙乾薑火內燒黑磁碗地下放冷為末每服一錢米飲調下升陽除濕防風湯治大便祕或裡急後重數至圊而不能便或少有白膿或少有血慎勿利之升舉其陽則陰氣自降矣蒼朮四兩防風三錢白朮一錢茯苓一錢白芍一錢每服一兩先將蒼朮片入水二碗煎至一碗半入諸藥同煎至一碗空心服芍藥湯治下血調氣溲而便濃血知氣行而血止則便自愈調氣則後重除白芍一兩當歸黃連黃芩各五錢官桂二錢半檳榔大黃各三錢甘草炙木香各二錢每服五錢水煎如痢不減漸加大黃如汗後臟毒加黃柏一方噤口痢百發百中鹿角二兩煅存性為末大人三錢小人一錢酒調送下不過一時即食一方治赤痢及噤口痢陽毒太甚酒一碗黃連三錢薑炒過煎空心溫服盦臍法治毒熱痢久不止嘔惡不食熱氣上攻噤口不食用田螺一個連殼搗爛入麝香少許盦臍內外川膏藥封之治赤白痢木香丸木香三錢青皮去穰六錢砂仁二十四個巴豆二十一個針穿燈上燒存性杏仁十四個去皮尖烏梅二十四個去核黃蠟上為末巴豆杏仁另研和勻溶蠟為劑臨用旋丸麻子大每十丸至二十五丸量大小虛實用紅痢甘草湯下白痢乾薑湯下赤白痢甘草乾薑湯下忌腥冷油膩香連丸黃連去須淨銼碎二十兩用吳茱萸十兩同拌以沸湯少許悶掩一伏時同炒香熟去萸用連廣木香四兩八錢不見火末之搜勻用雞子清少入醋糊丸如桐子大每服五十丸白湯送下瘧疾無汗者要有汗散邪為主帶補有汗要無汗正氣為主帶散瘧脈多弦弦數多熱弦遲多寒亦有病久脈極虛微之中少見弦但不搏手細察可見也弦如刀刃者死弦小者生清脾飲治脾瘧脈來弦數熱多寒少口苦咽熱小便赤澀青皮厚朴各七分白朮茯苓各一錢黃芩一錢二分柴胡一錢半草果七分甘草五分如有汗以白朮茯苓為君熱多加黃芩柴胡寒多加半夏草果渴加知母麥門冬天花粉上水二鍾薑三片煎柴平湯治熱多寒少者最效治瘧寒熱交作胸膈痞滿飲食不進頭目昏眩人參柴胡黃芩半夏甘草蒼朮陳皮厚朴川芎草果各等分上水煎服人參養胃湯治久瘧虛瘧或間一日一發或三五日一發寒多熱少者人參一錢半夏八分陳皮八分甘草五分茯苓八分藿香一錢厚朴一錢蒼朮八分草果七分用生薑四兩搗取汁露一宿次日早晨用棗二枚烏梅一枚水煎入上薑汁溫服加味補中益氣湯治人平素不足兼以勞役內傷挾感寒暑以致瘧疾寒熱交作肢體倦軟乏力少氣黃耆一錢半夏芍藥人參白朮當歸各八分甘草五分升麻三分柴胡一錢陳皮七分有汗及寒重加桂香熱盛倍加柴胡黃芩渴加麥門冬天花粉上作一服水二鍾薑三片煎小阿魏丸五月五日午時取獨蒜不拘多少搗爛入黃丹再搗勻手搓為丸龍眼核大曬乾但瘧疾二三日發後臨發日雞鳴時以一丸捶碎井華水面東服之紅丸子治食積瘧三稜莪朮青皮陳皮各五錢乾薑胡椒各三錢上為細末醋煮麵糊丸梧子大紅礬為衣每服三十丸薑湯送下一方治瘧母此藥消導積塊青皮桃仁紅花神麯麥芽鱉甲醋炙黃連三稜莪朮柴胡陳皮甘草海粉香附米並用醋煮為丸梧子大每五七十丸空心溫水送下一方常山飲草果檳榔常山陳皮青皮杏仁烏梅厚朴各等分上水煎露一宿臨發日五更時服一方用白芷南星常山各二錢用無根一拋水煎露一宿發日五更服露薑飲治脾胃受濕聚痰發為寒熱瘧疾用生薑四兩和皮搗絞汁露一宿發日五更冷服又方常山飲知母貝母常山草果檳榔各等分上水煎露一宿發日五更服寒多萬安散治一切瘧疾寒多熱少必須先用此藥發散然後用四獸之類截之因食倍加草果蒼朮厚朴陳皮檳榔常山酒浸草果甘草水煎露一夜五更服七寶飲治一切瘧疾無問寒熱多少及山嵐瘴氣又治瘧寒多熱少厚朴陳皮甘草草果常山檳榔青皮上水酒各半煎發日五更服六合湯治瘧熱多寒少止截之劑人參知母草果貝母烏梅白芷檳榔常山各等分上薑三片棗二枚水酒各半煎露一宿五更服瘧疾神效方常山厚朴半夏茯苓草果檳榔陳皮甘草少許渴加烏梅一個久者加殭蠶七個上水二鍾薑三片煎露一宿發日五更服又硃砂丸硃砂一錢好者水飛過棗肉為丸龍眼核大臨發之日五更酒送下有痰吐痰有積去積永不發四獸飲治五臟氣虛喜怒不節致陰陽相勝結聚涎飲與衛氣相搏發為瘧疾人參白朮茯苓橘紅草果仁半夏棗子生薑烏梅各一錢甘草五分上加鹽少許淹食須用厚皮紙裹了以水濕之慢火炮令香熟焙乾每服半兩水二鍾煎至六分未發時並進數服水腫水腫之證有陰有陽察脈觀色問症須詳陰脈沉遲其色青白不渴而泄小便清澀脈或沉數色赤而黃燥糞赤溺兼渴為陽又遍身皮膚光腫如泡手按成窟舉手即滿者是因脾虛不能制水水漬妄行故也法當補脾使脾氣得實則自健運切不可下忌食羊肉腰已上腫宜發汗腰已下腫宜利小便治方陳皮半夏茯苓各一錢甘草炙三分人參白朮蒼朮各一錢麥冬五分山梔五分豬苓澤瀉各五分若腹脹少佐厚朴氣不運加木香木通夏月加香薷氣若下陷加升麻柴胡有熱加黃芩産後必須大補氣血為主少佐蒼朮茯苓女人胎腫不須治上水二鍾薑三片煎五皮散治腫煩渴小便赤澀大便閉此屬陽水宜此治面腫尤妙陳皮桑白皮生薑皮大腹皮茯苓皮每服五錢水煎實脾散治腫不煩渴大便溏小便少不澀此屬陰水厚朴白朮木瓜大腹子附子木香草果茯苓乾薑各一兩甘草五分上水二鍾薑五片煎忌鹽醬甜物少用加味枳朮湯治氣為痰飲所隔心下堅脹此屬氣水枳殼白朮紫蘇梗葉官桂陳皮檳榔桔梗木香五靈脂各三分半夏茯苓甘草各一分半上水一鍾半生薑三片煎服不治症先四肢腫而後歸於腹大便滑泄唇黑缺盆平臍突肉硬男從腳下腫上女從面上腫下皆不治一方用赤小豆及各色豆子煎湯遍身熱洗數次大小便下惡物效退腫消毒散治積水驚水飲水過多停積於脾或四肢及身熱蘿蔔子炒小豆各五錢甘草二分陳皮五錢木香二錢半每服二錢薑二片煎理氣化滯健脾湯木香七分陳皮一錢厚朴炒八分豬苓一錢葶藶炒七分香附炒一錢枳殼炒一錢白茯一錢大腹皮五分白朮炒一錢梔子炒七分商陸五分木通五分薑三片水煎服胃苓湯治下部濕胞囊及陰莖腫大加木通梔子煎服好見泄門一方治水腫鼓脹有效苦葶藶甘遂麵裹煨熟水浸冷用商陸根大戟各二錢半大黃芫花炒各三錢輕粉少許黑牽牛頭末一兩上為末入輕粉再研溫蜜水調下二錢忌生冷鹽醬一百日取下黑黃臭水為效一方五月五日不見日取螻蛄不拘多少焙乾凡一病用七個為度先用七個頭研為末治上次用腹研末治中再用足研為末治下每食前好酒調下一方治腫黑牽牛頭末檳榔為末等分如取蟲積沙糖水調下忌鹽醬生冷百日上為末每服三錢好酒空心調下利去水三五次其腫自消一方水腫從腳下起則殺人用赤小豆一斗水二斗煮令極爛取汁四五升漬膝下若以入腹但服小豆勿雜食豆亦愈葶藶木香散治濕熱內外甚水腫腹脹小便赤澀大便滑泄此藥下水濕消腫脹止瀉利小便之聖藥也又方治疝氣並偏效葶藶赤茯苓豬苓白朮各二錢五分木香五分澤瀉木通甘草各五錢官桂二錢五分滑石三兩上為末每服三錢白湯調服煎服亦可水腫主方五加皮大腹皮枳殼青皮茯苓防己各等分上一鍾半薑三片煎傷食脾虛泄瀉後發腫加炒白朮蒼朮麥芽去枳殼氣腫加蘿蔔子檳榔炒小便不通加木通燈心車前子琥珀末伏中濕熱加梔子蒼朮上部三陽腎手浮腫風濕宜汗加麻黃荊芥蔥白足部三陽腰腹腫宜下加黑牽牛葶藶芫花俱宜淡口味靜心減欲斷厚味四苓五皮散治病後虛腫不服水土者尤宜白朮澤瀉豬苓蒼朮木通茯苓皮五加皮大腹皮地骨皮桑白皮青皮加燈心如氣脹加木通磨入不欲食砂仁麥芽心下悶加檳榔青皮再加生薑皮尤好水煎服十棗丸治水氣浮腫上氣喘急大小便不通甘遂大戟芫花醋炒上為末棗煮熟去皮核為丸每四十丸清晨熱湯下利黃水為度未利再服續隨子丸治遍身浮腫喘悶不快人參防己赤茯炒木通木香檳榔續隨子海金沙另焙各五錢苦葶藶四兩共為末棗肉丸梧子大每服五十丸桑白皮湯送下香平散香附黑牽牛三稜莪朮乾生薑等一斤入平胃散末半斤每服二錢半滾白水或薑湯調下海金沙散治水腫要方海金沙一錢白朮一錢蒼朮八分厚朴一錢陳皮八分澤瀉七分豬苓七分茯苓皮一錢五加皮五分生薑皮五分大腹皮五分商陸七分甘草皮五分上水二鍾煎至一鍾稍熱服渣再煎服三花神佑丸見濕門鼓脹鼓脹外堅中空似鼓也理宜補脾又須養肺金以制肝木使脾無賊邪之慮滋腎水以制相火使肺得清化之令卻鹽味以防助邪斷妄想以保母氣切不可下宜遠音樂斷厚味戒暴怒無有不安脈浮大而滑實者生濡小而虛微者死脹滿脈弦脾制於肝洪數熱脹遲微冷寒浮為虛滿緊則中實浮則可治虛則危惡治方人參八錢白朮一錢陳皮一錢蒼朮一錢厚朴薑製五分澤瀉五分麥門冬五分白茯苓一錢上水一盞半煎服若朝急暮寬者倍人參白朮肥白人氣虛者同若朝寬暮急者加薑炒黃連歸身酒芍藥香附川芎生地黃去人參黑瘦人氣熱者亦同氣下墜者宜加升麻日夜急氣血皆虛俱補之如脈實堅人壯盛者或按之不堅不痛則可下之消之以補之治一切蠱脹並氣虛中滿單腹脹方茯苓皮草果皮五加皮大腹皮甘草皮牡丹皮地骨皮生薑皮木通皮木瓜皮大腹子車前子葶藶子菟絲子紫蘇子上各等分水二盞煎至八分服之如要斷根將十五味藥等分為細末各一錢五分用雄豬肝一個不見水者先用溫水煮一滾取出用竹尖鑽孔數個入藥在內蒸熟切片搗蒜蘸食之不過一二個永不發也一方治鼓脹氣滿用苦丁香為末棗肉為丸梧子大每服三十丸空心棗湯下三服見效廣茂潰堅湯治中滿腹脹內有積塊堅硬如石令人坐臥不安大小便澀滯上氣喘促遍身虛腫厚朴黃芩益智草豆蔻當歸各五錢黃連六錢半夏七錢廣朮升麻紅花酒洗吳茱萸各二錢甘草生柴胡澤瀉神麯炒青皮陳皮各三錢渴加葛根每服七錢薑三片水煎一方鼓脹用家旱蛤蟆兩三個裝入公豬肚子內蒸熟食之好一方治氣鼓脹滿蒼朮二兩南木香一兩黑礬少許上清水煎服一方治氣鼓水腫及大便不通用頭上有蓋蜣螂每一個入巴豆仁一個燒存性研細末酒調四分空心服利去水妙一方牛黃一分道人心即老柳內心一錢焙乾巴豆一錢去油共合一處丸每服七丸黃酒送下一方治腫脹海金沙厚朴茯苓皮各一錢白朮蒼朮各八分陳皮澤瀉豬苓桑白皮各七錢五加皮生薑皮大腹皮甘草各五錢商陸七錢上水二盞煎服
