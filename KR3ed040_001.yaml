上就將此紙作捻子如點燈法吹滅以煙燻入鼻中一霎時口鼻涎流牙關開矣一方治聲音不清訶子肉三錢半生半熟木通三錢半生半熟桔梗五錢甘草三錢半生半炒生地黃三錢水煎食遠服清咽利膈湯治咽喉熱毒腫痛痰涎壅盛防風荊芥薄荷桔梗黃芩黃連各一錢半山梔連翹玄參大黃朴硝牛蒡子甘草各七分上水煎食遠徐徐溫服一方諸物刺喉成瘡腫痛危急者黃耆蜜炙一錢訶子去核七分蒼朮一錢五味子二十粒黃連五分烏梅去核七分水煎徐徐溫服頭痛多屬痰痛有可吐可下者脈訣舉要曰頭痛陽弦浮風緊寒風熱洪數濕細而堅氣虛頭痛雖弦必澀痰厥則滑腎厥堅實羌活白芷湯治頭風傷風感風一切頭痛婦人產後加當歸石膏調服菊花去萼一兩細辛五錢甘草七錢半白芷羌活香附薄荷各三兩荊芥穗五錢茵陳五錢蒼朮川芎各一兩上為細末每服二錢茶清調服上清散治因風頭痛眉骨痛眼眶痛不可忍者川芎鬱金白芍荊芥薄荷芒硝各一錢半乳香沒藥各五分片腦一分半上為細末每服一字鼻內搐之菊花散治風熱上攻頭痛不止石膏菊花防風旋覆花枳殼蔓荊子甘草羌活各一錢半上水二鍾煎至七分食遠熱服加生薑五片天香散治年久頭風頭痛不愈者天南星半夏湯泡川烏去皮白芷各等上每服四錢水煎入薑汁半酒鍾食遠溫服一方治控腦沙頭痛用絲瓜藤燒存性研二錢酒調服九龍丸治男女八般頭風一切頭痛川芎石膏白芷川烏半夏南星各半兩加細辛全蠍上為末韭汁為丸梧子大每五十丸茶清下順氣和中湯即調中益氣湯治氣虛頭痛升陽補氣亦治氣血雙虛頭痛黃耆一錢半人參一錢甘草二分白朮陳皮當歸芍藥各五分升麻柴胡各三分加細辛蔓荊子川芎各三分上作一劑水煎服半夏白朮天麻湯治脾胃症已經疏風丸下二三次原證不瘳增以吐逆痰唾稠黏眼黑頭旋目不敢開頭苦痛如裂四肢厥冷不得安臥此氣虛頭痛也又治痰作眩暈夾氣虛者兼治痰厥頭痛黃柏二分乾薑三分澤瀉茯苓天麻黃耆人參蒼朮各五分神麯炒白朮各一錢麥芽炒半夏陳皮各一錢上每服五錢姜三片水煎服芎歸湯治血虛頭痛川芎當歸上每服五錢水煎服四神散治婦人血風眩暈頭痛菊花當歸旋覆花荊芥穗各等上共為末每服二錢蔥白三寸茶末二錢水一鍾半煎食遠熱服秘方貼頭風熱痛大黃朴硝各等為末井底泥和作餅貼兩太陽穴神效選奇湯治眉骨痛不可忍大效羌活防風各二錢甘草二錢夏生冬炒酒芩一錢每服三錢水煎服祛風清熱散治風熱頭目昏痛偏正頭風頭痛鼻塞俱治細辛一分半酒芩二錢白芷一錢二分防風八分柴胡稍八分川芎一錢荊芥七分羌活七分甘草五分蔓荊子三分天麻七分石膏一錢半菊花七分水煎食遠熱服治偏正頭痛應驗方耳中或左或右如抽筋痛者半邊頭痛是也用黃蠟一二兩鐵杓內化開將白紙蠟面上拖過如蠟紙樣每一紙闊二寸長五寸將真蘄艾揉軟薄攤蠟紙上以筋卷為筒一頭插耳孔內一頭用火捻之令煙氣入耳熱氣透入腦其痛即止再不發右耳痛插右左耳痛插左耳不過二次效校艾葉按本經及諸註釋云生於田野復道者佳未嘗以州土拘也世俗反目此為野艾惟以蘄州產者貴重之殊不知蘄產者九牛草形類艾世俗遂以艾呼之實非艾也為穰絮絨長作印色極佳氣雖艾香而力實不及眩暈左手脈數熱多脈澀而有力為死血右手脈實有痰積脈大是久病為氣血俱虛痰濁不降也此痰在上火在下火炎上而動痰也眩言其黑暈言其轉無痰不能作眩經云諸風眩暈皆屬肝木風則有汗寒則掣痛暑則熱悶濕則重滯此四氣乘虛而眩暈又或七情鬱而生痰痰因火動隨氣上厥此七情致虛而眩暈也淫欲過度腎家不能納氣歸元使諸氣逆奔而上此氣虛而眩暈也吐衄崩漏肝家不能收攝榮氣故使諸血失道妄行此血虛眩暈也治方陳皮半夏茯苓甘草桔梗枳殼黃芩蒼朮羌活白朮姜三片水煎芎歸湯治血虛頭痛眩暈亡血過多者有之見頭痛門一方治眩暈不可當者以大黃酒炒為末米湯調服亦治頭痛量虛實用頭暈方利痰清氣降火右手脈實大者有痰積南星制五錢半夏一錢桔梗七分枳殼一錢甘草三分茯苓一錢黃芩一錢姜七片水煎服半夏白朮天麻湯見頭痛安神湯治頭痛頭旋眼黑甘草四錢半生半炒防風二錢半柴胡升麻生地黃酒洗知母酒炒黃柏酒炒羌活以上各一兩黃耆二兩加蔓荊子川芎每服五錢水煎食遠服紫金錠治男子婦人苦頭風作暈用酒磨服一二錠吐痰碗許遂不復發一方凡婦人頭風眩暈如登車乘舡眼澀手麻發脫健忘喜怒不常皆胸中有宿痰所致用瓜蒂散吐之見中風門上清散見火門頭風面腫屬痰者多有熱有風有血虛在左屬風薄荷荊芥屬血虛用芎歸在右屬痰蒼朮半夏屬熱酒芩為主又屬痰川芎南星蒼朮又方酒芩一兩蒼朮羌活防風各五錢細辛二錢蒼耳子三錢上為末每服三錢生薑三片同擂勻茶湯蕩起服之又方酒片芩蒼朮各二錢半羌活蒼耳川芎生甘草酒黃連半夏曲炒各錢半上為末同上法服消風散見傷風門一方治諸風上攻頭目昏眩偏正頭風或面腫及婦人頭皮腫癢並皆治之一方治面腫牙痛眼眶痛又治骨槽風腫痛不可忍升麻乾葛白芷蒼朮柴胡藁本防風羌活甘草黃柏麻黃當歸生地石膏黃連牡丹皮上姜三片棗一枚煎服腰痛有腎虛有瘀血有濕熱有閃挫有痰一方治腎虛腰痛動止軟弱不能支持脈弦大而虛痛之不已者是杜仲酥炙去絲盡龜板酥炙黃柏酒炒知母去毛酒炒枸杞子五味子當歸酒洗芍藥酒炒黃耆破故紙炒各一兩上為末煉蜜同豬脊髓為丸梧子大每八十丸空心鹽湯下青蛾丸專滋腎水壯陽益筋骨治腰膝足痛久服極驗破故紙四川者佳酒浸少時隔紙炒萆薢真正四兩切片分作四分鹽水浸一分童便浸一分泔水浸一分酒浸一分杜仲四兩去粗皮薑汁炒斷絲胡桃肉八兩湯泡去皮黃柏四兩蜜炒知母去毛三兩蜜炒牛膝四兩酒浸上為細末春夏用糯米糊丸先將胡桃肉搗如膏和勻石臼中樁千餘下丸如梧子大每服五十丸加至八十丸空心鹽湯鹽酒任下以乾物壓之獨活寄生湯治腎虛氣弱為風濕所乘流注腰膝或攣拳掣痛不得屈伸或緩弱冷痹行步無力秦艽獨活桑寄生如無以續斷代細辛牛膝茯苓白芍桂心川芎防風人參熟地當歸杜仲炒甘草炙各三兩每服三錢水一鍾煎空心服原利去地黃一方治濕熱腰痛動止滯重不能轉便遇天陰則發脈緩者是也杜仲酒鹽炒去絲黃柏酒炒蒼朮米泔炒川芎當歸白朮破故紙炒各一錢水煎摩腰丹治寒濕腰痛附子尖烏頭尖南星硃砂乾薑各一錢雄黃朝腦丁香麝香各五分上為末蜜丸彈子大姜水化開手摩痛處以綿衣縛定腰熱如火每三日用一丸或內加吳茱萸官桂一方治寒濕腰痛生料五積散加吳茱萸五分杜仲一錢炒見中寒門一方痰積腰痛脈滑者是南星薑製錢半半夏薑製錢半茯苓八分甘草五分蒼朮一錢黃柏炒一錢陳皮一錢上姜三片水煎服一方治瘀血腰痛日輕夜重脈澀者是也川芎八分當歸一錢半芍藥一錢桃仁九個紅花八分杜仲鹽酒炒一錢空心水煎服一方治寒濕痰積瘀血氣滯腰痛炒胡鹽二升布包乘熱熨之數遍愈立安丸治虛老腰痛壯筋骨妙故紙酒洗過青鹽炒二兩川續斷一兩五錢木瓜一兩半川萆薢二兩杜仲薑汁炒斷絲牛膝酒浸一兩半胡桃肉湯浸去皮四兩研為膏煉蜜為丸梧子大每七八十丸空心鹽湯鹽酒任下脅痛系火鬱肝火盛木氣實有死血有痰流注肝急木氣實用蒼朮川芎青皮當歸之類痛甚者肝火盛以龍薈丸焙熱薑湯下是泄火之要藥死血用桃仁川芎痰流注以二陳湯加南星蒼朮川芎肝苦急急食辛以散之撫芎川芎蒼朮一方治咳嗽脅痛以二陳湯加南星香附青皮青黛入薑汁當歸龍薈丸治內有濕熱兩脅痛先以琥珀膏貼痛處卻以生薑汁吞此丸龍膽草當歸大梔子黃連黃芩各一兩大黃蘆薈各半兩木香一錢半黃柏一兩麝香五分上為末麵糊丸治丸治脅痛曲丸降肝火一方加柴胡川芎各五錢又方加青黛五錢推氣散治右脅疼痛脹滿不食枳殼桂心片薑黃各半兩甘草炙一錢半上為末每服二錢薑棗湯調下酒亦可鹽煎散治男婦一切冷氣攻上胸脅刺痛不能已及脾胃虛冷嘔吐泄瀉膀胱小腸氣婦人血氣痛砂仁甘草茯苓草果煨肉豆蔻煨川芎小茴香炒蓽澄茄麥芽檳榔良薑枳殼蒼朮陳皮羌活厚朴上每服三錢鹽少許空心煎服沉香升氣湯治一切氣不升降脅肋刺痛胸膈痞塞沉香檳榔各三錢半人參訶子肉大腹皮酒焙各半兩白朮紫蘇葉香附炒神麯炒麥芽炒烏藥各一兩陳皮甘草薑黃各四兩三稜煨莪朮煨益智炒厚朴姜炒各二兩上銼水煎服調中順氣丸治三焦不和水飲停積脅下虛滿或時刺痛又治心痛徹背背痛徹心木香白豆蔻青皮陳皮三稜各一兩大腹子半夏各二兩砂仁檳榔沉香各五錢上為末水糊丸每三五十丸陳皮湯下柴胡瀉肝湯治鬱怒傷肝脅肋痛在左者柴胡一錢二分甘草五分青皮炒一錢黃連炒八分山梔炒八分當歸酒製一錢二分芍藥一錢龍膽草一錢水煎服一方治死血作痛瘦人多怒者常患此桃仁九個紅花八分川芎八分歸尾酒製一錢半芍藥一錢柴胡八分青皮八分香附一錢上用水一鍾煎服一方治肥白人氣虛兩脅痛發熱者人參七分黃耆八分柴胡一錢黃芩八分木香六分青皮一錢川芎五分上水一鍾半生薑三片棗二枚煎稍熱服
