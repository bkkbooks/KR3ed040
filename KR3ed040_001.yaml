body:
  text: 卷一中風中風大率主血虛有痰或挾火與濕當以治痰為先次養血行血又須分氣虛血虛脈遲數者可治大數而極者難治中腑者面顯五色有表證而脈浮惡風惡寒拘急不仁其病多易治中臟者唇吻不收舌不轉而失音鼻不聞香臭耳聾而眼瞀大小便秘結或口開手撒眼合遺尿吐沫直視喉如鼾睡肉脫筋痛髮直搖頭上竄面赤如裝或頭面青黑汗綴如珠其病深多不治中腑者宜汗中臟者宜下汗下不宜太過汗多則亡陽下多則亡陰治風之法初得即當順氣日久則當活血此萬古不易之論又云半身不遂大率多痰在左屬死血少血在右屬氣虛有痰左用四物湯兼二陳加桃仁紅花竹瀝薑汁在右用四君子湯兼二陳亦入竹瀝薑汁俱當隨證施治不可執一若外無六經之形證內無便溺之阻膈惟肢體不遂語言謇澀宜大秦艽湯養之當順時令調陰陽安臟腑和榮衛未有不愈者也又有年高氣弱以將息失宜或七情相干而卒似風狀者非外來風邪乃本氣為病也若以風藥治反害非輕此劉守貞許學士之高論也不可不察通關散治卒中風邪昏迷不省牙關緊急湯水不下細辛洗去土葉豬牙皂角去子各一錢上為細末男左女右吹鼻中一方加半夏稀涎散治中風忽然若醉形體昏悶四肢不收涎潮搐搦氣閉不通明礬一兩豬牙皂角四個上為細末薑湯調服吐痰好一方加半夏一錢祛涎散治中風不省人事多因痰壅所致白礬二錢生為末生薑自然汁調服其痰或吐或化便蘇蜜水滾水俱可調服腹中響即開一方鹽滷水加薑汁灌下好一方痰厥不省人事清油灌下須臾吐痰好一方大紅末子治痰迷心不省人事白礬一兩硃砂一錢上為細末每白湯調服一錢一方用生五倍子為末先用香油拌勻再用溫水調灌下痰吐法輕用瓜蒂鰕汁皂角重用藜蘆半錢或三分加麝香灌入鼻內或口內吐痰出一吐不已再吐之亦有虛而不可吐者紫金錠治中風中氣口眼歪斜言語謇澀一應風氣或牙關緊急口噤筋脈攣縮骨節風腫手足疼痛行步艱辛並用酒磨下一錢烏藥順氣散治男子婦人一切風氣攻注四肢骨節疼痛肢體頑麻手足癱瘓言語謇澀者宜先服此藥疏通氣道然後進以風藥氣上升為逆降下為順順氣者正所謂降氣也麻黃去根節陳皮去白烏藥各二兩姜蠶去嘴炒令絲斷川芎枳殼去穰麩炒甘草桔梗去蘆白芷各一兩乾薑炮五錢手足不能起加續斷威靈仙左癱右瘓加當歸天麻蒺藜上水一鍾半生薑三片煎服八味順氣散凡中風之人先服此藥順氣後進風藥白朮白茯苓青皮陳皮白芷烏藥人參甘草上每服六錢水一盞煎至半盞溫服仍以酒化蘇合香丸間服大秦艽湯治中風外無六經之形證內無便溺之阻膈知為血虛弱不能養於筋故手足不能運用舌強不能言宜養血而筋自榮秦艽石膏各三兩甘草川芎當歸羌活獨活防風黃芩白芍白芷白朮生地熟地白茯苓各二兩細辛五錢上每服一兩水煎如天陰加生薑七八片三化湯治中風外有六經之形證先以加減續命湯隨證治之內有便溺之阻膈復以此導之厚朴薑製大黃枳實羌活各等分上銼每服三兩水三升煎至一升半終日服之以微利則已如內邪已除外邪已盡當從愈風湯以行中道久服大風悉去縱有微邪只從愈風湯加減治之然治病之法不可失於通塞或一氣之微汗或一旬之通利如此為常治之法也久則清濁自分榮衛自和羌活愈風湯治肝腎虛筋骨弱語言難精神昏憒及治風濕內弱風熱體重或瘦而一肢偏枯或肥而半身不遂心亂則百病生靜則萬病息此藥能安心養神調陰陽無偏勝羌活甘草炙防風去蘆黃耆去蘆人參去蘆蔓荊子川芎細辛去蘆土葉枳殼去穰麩炒地骨皮麻黃去節知母去皮毛獨活白芷杜仲炒去絲秦艽去蘆柴胡去苗半夏湯洗薑製厚朴薑製熟地黃防己前胡各二兩芍藥黃芩去腐白茯苓各三兩石膏生地黃蒼朮各四兩桂一兩上銼每服一兩水二盞煎至一盞溫服如遇天陰加生薑三片煎空心服臨臥煎渣常服之藥不可失於四時之輔如春望大寒之後加半夏柴胡人參各二兩望夏穀雨之後加石膏黃芩知母各二兩季夏之月加防己白朮茯苓各二兩望秋大暑之後加厚朴藿香各二兩桂一兩望冬霜降之後加附子官桂各一兩當歸二兩涼膈散治中風心經痰氣壅塞不能言語連翹一錢山梔大黃薄荷黃芩各五分甘草一錢半硝二分半黃連五分大便如常去硝黃有氣加香附桔梗痰壅盛中風不能言加枳實膽星菖蒲半夏桔梗茯苓大便如常去硝黃上水一盞半生薑五片煎服轉舌膏加菖蒲遠志蜜丸彈子大硃砂為衣每服一丸薄荷湯化下一方中風愈後痰壅氣滯胸膈迷悶南星八錢薑製透廣木香一錢上姜七片水煎服一方治風疾如神三年風癱亦治川芎白芷細辛兩頭尖炮各一兩川草烏一錢炮上為細末將蔥白切搗如泥同前藥再搗千捶捏如錢大餅子陰乾每服一餅細嚼茶湯送下服一月效搜風順氣丸治腸胃積熱以致膈間痞悶大腸結燥小便赤澀腸風痔漏腰膝痠痛肢節頑麻手足癱瘓行步艱辛語言謇澀三十六般風七十二般氣無不治之此藥宣通氣血清熱潤燥通利大小便則諸病自愈車前子一兩半白檳榔火麻子微炒去殼另研菟絲子酒浸焙乾牛膝酒浸二宿乾山藥各二兩枳殼防風獨活各一兩郁李仁湯泡去皮研二兩大黃五錢半生半熟有加二兩者有五兩者上為細末煉蜜丸梧子大每服二十丸茶清米飲任下早晚各一服覺大腸微動以羊肚肺羹補之此藥膏粱之家肥甘大過以致大便結燥尤宜服之老人大腸無血最宜烏龍丹川烏去皮臍五靈脂各五兩入龍腦麝香各一分又云各一錢上研令勻滴水丸如彈子大每服一丸先以生薑汁研化次以暖酒調服早晚各進一服五七丸便抬手足十丸可自梳頭一方治中風口眼歪斜用巴豆七枚去皮爛研左喎塗右手心右喎塗左手心仍將熱水一碗安手心中須臾便正洗去頻頻抽扯手中指好一方治中風三年不較者松葉一片細切以酒一斗煮取三升頓服汗出立瘥選奇湯治眉疼不可忍此乃風疾先兆也羌活防風各二錢甘草二錢夏生冬炒黃芩四制冬月不用一錢每服一兩時時服免風起起左湯治氣厥痰厥血虛癱左即四物二陳加順氣安神之藥烏藥童便煮一錢桔梗枳殼炒秦艽橘紅生地各八分半夏姜炒白茯苓黃芩酒炒各一錢當歸酒洗芍藥酒炒羌活川芎各七分甘草炙枳實去穰炒各五分細辛二分南星炮八分心神不寧加茯神遠志歸身上水一盞半生薑五片煎服起右湯治瘓右者氣虛痰盛言語謇澀即四君子二陳湯加通氣藥陳皮半夏南星茯苓甘草人參白朮烏藥羌活秦艽桂皮酒芩酒柏防風白芷肥白人加熟附子三分言語難加菖蒲桔梗手足不遂加威靈仙續斷血少加川芎當歸足腫加防己大便燥常服搜風順氣丸上水一盞半生薑五片煎服小續命湯治卒暴中風不省人事半身不遂口眼歪斜手足顫掉語言謇澀肢體麻癢精神昏亂頭目眩暈痰涎壅盛筋脈拘攣及腳氣緩弱不能動履屈伸防己桂心黃芩杏仁去皮尖炒芍藥甘草炙川芎麻黃去節人參各一錢四分防風二錢附子炮七分此藥通行諸經引用藥也上銼分作二服水二盞生薑五片棗二枚煎八分食遠熱服精神恍惚加茯神遠志骨節煩痛有熱者加芍藥去附子心煩多驚加犀角骨節重痛有寒濕倍加官桂附子嘔逆腹脹加半夏倍人參躁悶大便澀去附子倍加芍藥入竹瀝臟寒下痢去防己黃芩加白朮自汗去麻黃杏仁加白朮腳膝弱加牛膝石斛身疼加秦艽腹痛加桃仁姜炒杜仲凡治中風不審六經之形證加減雖治無益加減法具於後麻黃續命湯治太陽中風無汗惡寒本方中麻黃杏仁防風各加一倍桂枝續命湯治太陽中風有汗惡風本方中桂枝芍藥杏仁各加一倍白虎續命湯治陽明中風身熱無汗不惡寒而渴本方中加知母石膏一錢四分去附子葛根續命湯治陽明中風身熱有汗惡風本方中加葛根官桂茯苓各一錢半附子續命湯治太陰中風無汗身涼本方中加附子一倍乾薑一錢桂附續命湯治少陰中風有汗無熱本方中加桂附甘草各一倍羌活連翹續命湯治六經混淆於少陰厥陰雜系中風肢節攣痛不仁本方中加羌活連翹各一錢半獨活寄生湯治風濕腰腿疼痛或日久臥床不起服七日見效獨活桑寄生如無以續斷代杜仲姜炒秦艽牛膝茯苓川芎人參防風細辛桂心各二兩芍藥當歸熟地黃各三兩甘草炙五錢上銼每服一兩水二盞姜三片煎至七分通口熱服黑虎丹治諸風有效治破傷風尤好乳香硃砂瓜天麻兩頭尖各五錢川烏川草烏炮各四兩蒼朮四兩半泔浸炒川芎石斛防風麻黃荊芥甘草各一兩白芷一錢何首烏當歸酥油炙一兩上為末煉蜜丸彈子大每服一丸嚼爛黃酒送下出汗好一方調養一切風疾麻木不仁或言語難或舌強或止麻止木語言如常俱可服當歸酒洗一錢半白芍酒炒一錢生地八分陳皮半夏薑製茯苓各一錢半白朮一錢柴胡菖蒲枳殼黃芩各七分川芎五分白芥子炒一錢甘草三分木香二分薄荷羌活各七分大黃一錢泄者去之氣虛加人參去大黃大便難不去上水二盞生薑三片煎至七分空心熱服牽正散治中風口眼歪斜半身不遂白附子白殭蠶全蠍去毒並生用各等為末不拘熱酒調服二錢活命金丹治中風神不清即涼膈散加青黛藍根上為細末煉蜜為丸如彈子大硃砂為衣金箔蓋之每服一丸茶清化開臨臥服清陽湯治中風口喎頰腮緊急胃中火盛必汗不止小便頻數升麻黃耆歸身各二錢葛根錢半紅花一分蘇木五分甘草炙一錢酒柏一分生甘草五分桂枝一分酒煎溫服不飲酒水煎服滌痰湯治中風痰迷心竅舌強不能言南星薑製半夏薑製各二錢半枳實麩炒二錢茯苓去皮二錢橘紅一錢半石菖蒲人參各一錢竹茹七分甘草五分水二鍾生薑五片煎服省風湯治卒暴中風口噤全不能言口眼歪斜筋脈攣急抽掣疼痛風盛痰實旋暈僵仆頭目眩重胸膈煩滿左癱右瘓手足麻木骨節煩疼步履艱辛恍惚不定神志昏憒一切風症可服防風天南星生用各四兩半夏湯泡生用生甘草黃芩各二兩上每服一兩水二盞生薑十片煎服同導痰湯合服尤好導痰湯南星炮一兩橘紅一兩赤茯苓一兩枳殼一兩甘草五分半夏七錢上水二鍾生薑五片煎服厥病附手足麻木麻是氣虛木是胃中有濕痰死血厥者逆也手足因氣血不相接逆而冷也因氣虛血虛者多有陽厥有陰厥陽衰於下則寒陰衰於下則熱陰厥者身涼不渴脈遲細而微手冷過肘陽厥者煩渴譫妄身熱而脈數手足雖冷不過肘也瓜蒂散吐而口噤者先用搐鼻藥瓜蒂炒赤小豆各等分上為末用香豉一合水二盞煮作稀粥去渣取三分之一和藥末一錢頓服之不吐少加得快乃止吐不止以麝香少許水調服解之氣厥身涼用蘇合香丸或八味順氣散今用紫金丹薑汁磨服甚妙氣虛厥脈細者用四君子湯痰厥脈弦用玉樞丹或牛黃丸或白朮竹瀝又方用大半夏三十個巴豆二十個為末丸小豆大硃砂為衣每服一丸薑湯送下姜附湯治寒厥迷悶四肢厥冷乾薑一兩附子一個生去皮臍挾氣功刺加木香五分挾風不仁加防風挾濕加白朮筋脈牽急加木瓜肢節痛加桂枝上銼正藥每服三錢加者另入三分之一四物湯治血虛厥脈大如蔥管者當歸川芎白芍熟地黃理中湯治寒厥脈沉微者人參白朮乾薑甘草甚加熟附子承氣湯治熱厥脈數大者大黃枳實厚朴芒硝白虎湯治暑厥腹滿身重自汗脈沉滑者石膏知母甘草糯米加味理中湯治蛔厥胃寒所生即理中湯加炒川椒五粒檳