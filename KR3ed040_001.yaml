細辛黃芩柴胡甘草乾葛白芷石膏上水二鍾火煨生薑三片棗二枚入黑豆一撮煎溫服取微汗為愈如不愈表症多而甚急者方用麻黃葛根為解表如里症多而甚急者先以調胃承氣湯為攻裡是也如以陰虛自中病發熱下利身疼痛脈沉細無力不渴倦臥昏重者又當先救里溫之回陽救急湯是分表裡寒熱而治也一方時氣發熱變為黃病所謂瘟黃也宜治內泄濕熱茵陳黃連梔子人參各一錢白朮茯苓厚朴木通各一錢木香七分芍藥一錢五分乾葛一錢半上水二鍾姜三片煎又方治大頭熱病黃芩黃連各一錢半桔梗生乾草荊芥穗薄荷葉各一錢上水一鍾半煎又方治大頭病側柏葉軟棗各五錢上水煎服蜜丸噙化尤妙大柴胡湯治諸服小柴胡湯症後病不解表裡熱勢更甚而心下急郁微煩或發熱汗出不解心下痞硬嘔吐下利或陽明病多汗或少陰病下利清水心下痛而口乾或太陰病腹滿或無表裡症但發熱七八日脈浮而數脈在肌肉實而滑數者及兩感諸症可微下者雙除表裡之熱並陽明少陽合病下利日晡發熱如瘧柴胡黃芩芍藥各二錢半大黃五錢半夏二錢枳實三錢生用小者是也兼不去穰其效甚速上銼如麻豆大作三服水一鍾半生薑棗子同煎至半鍾溫服如未利再服火門氣有餘便是火氣從左邊起者肝火從臍下起者陰火也熱從腳下氣起入腹者虛之極也陰虛火動難治輕者可降重則從其性而折之實火可瀉虛火可補升陽散火湯治男子婦人四肢發熱筋骨間熱表熱如火燎於肌膚捫之烙手此病多因血虛而得或胃虛過食冷物郁遏陽氣於脾土之中並宜服此升麻葛根獨活羌活白芍人參甘草半生半熟柴胡防風各等分上清水煎服忌寒冷物黃連解毒湯治實火燥亂煩渴搐熱內甚等症此所謂實火宜瀉也黃芩黃連黃柏梔子各等分上水煎服去梔子加大黃名大黃金花丸加大黃梔子名梔子金花丸丹溪云人壯氣實火盛顛狂可用正治或硝黃冰水與之虛火盛狂者以生薑湯與之若投冰水正治立死上清防風散治上焦不利風熱攻衝氣血鬱滯牙齒悶痛斷肉虛腫鼻塞聲重頭目昏眩並皆治之防風細辛薄荷各二錢半川芎一錢七分獨活天麻荊芥穗甘草炙白檀白芷各一錢二分片腦一分半上為細末入片腦再研每服二錢淡茶清調稍熱漱冷吐不拘時如覺頭目昏疼牙齒悶熱茶清調三錢食後服清神散羌活枳殼歸身白朮薄荷甘草龍膽草桔梗黃芩半夏防風連翹川芎玄參梔子仁水一盞半生薑三片煎清氣散治熱氣壅盛痰涎胸膈煩熱枳殼川芎柴胡前胡茯苓甘草獨活羌活青皮白朮人參上各等分為細末每服二錢水一鍾加荊芥穗煎龍腦雞蘇丸消煩渴涼上膈解酒毒除邪熱治咳嗽唾血吐血諸淋下血胃熱口臭肺熱咳腥脾熱口甜膽熱口苦並宜治之柴胡一兩麥門冬四兩阿膠炒蒲黃炒各二兩人參一兩生地六兩另研甘草炙一兩五木通二兩同柴胡浸柴胡二兩和木通以湯半升浸一二宿取汁後為膏薄荷淨葉一斤上除別研藥併為末用蜜二斤先煉一二沸後下生地末不住手攪勻取木通柴胡汁漫火熬成膏後將其餘藥末和為丸黃豆大每服二十丸嚼破熱水下看病調引用之加減四物湯治陰虛火動此火起於九泉穴此乃補陰降火之妙劑也當歸白芍川芎生地黃柏黃芩熟地各等分上水一盞半煎甚者加龜板氣虛者加人參白朮黃耆一法用附子末津調塗湧泉穴有以艾灸之者上清丸治咽喉腫痛痰涎壅盛堵塞玄參五錢烏梅三個薄荷葉一斤川芎防風各二兩桔梗五錢砂仁五錢甘草四兩上為末煉蜜丸噙化一方加硼砂五錢上清散清頭目上焦火邪兼腮腫牙爪合涼膈散或合清胃散用好薄荷川芎防風桔梗甘草荊芥菊花玄參黃芩上水二鍾煎服消風散治丹毒屬血風血熱亦治頭面赤腫或成瘡癤荊芥穗甘草炙陳皮厚朴各五錢白殭蠶蟬退人參茯苓防風川芎藿香羌活白芷上為末荊芥茶清湯調服調中湯治內傷外感而發陰斑此無根失守之火聚於胸中上熏於肺傳於皮膚如蚊蟲形狀而非錦紋也蒼朮一錢五分陳皮砂仁藿香白芍甘草桔梗半夏白芷羌活枳殼川芎各一錢麻黃桂枝各五分上水二鍾姜三片煎東垣升陽降火湯治肌熱煩悶面赤食少喘嗽有痰右關脈或緩或數濕熱所致羌活甘草黃耆蒼朮升麻柴胡人參黃芩黃連石膏上水二鍾煎滋陰降火湯治臟腑積熱六經有餘之火方見虛損門桃仁承氣湯治邪熱傳裡熱蓄膀胱其人如狂小水自利大便黑小腹滿痛身目黃疸白朮茯苓黃耆龍眼肉酸棗仁人參各一兩木香五錢甘草二錢半上水煎生薑五片棗三枚看上下食前後溫服中暑暑傷於氣所以脈虛弦細芤遲體狀無餘玉露散治暑渴寒水石滑石石膏栝蔞根各二兩甘草一兩上為細末每服五錢新汲水調服益元散治中暑身熱小便不利此藥性涼能除胃脘積熱又淡能滲濕故利小便而散濕熱也方見傷寒門生脈散止渴生津人參麥門冬五味子上水一鍾煎香薷飲治伏暑引飲口燥咽乾或吐或泄並皆治之厚朴薑製半片白扁豆微炒半斤香薷去土一斤有痰加南星半夏上每服三錢水一鍾入酒少許煎冷服熱服作泄一方加黃連四兩薑製炒老黃色大順散治伏暑熱引飲過多脾胃受濕水穀不分霍亂嘔吐臟腑不調或作泄瀉甘草三斤乾薑杏仁肉桂各六兩四錢上將甘草用白沙蜜炒及八分入乾薑同炒卻入杏仁炒候杏仁不作聲為度用篩篩淨後入肉桂一處搗羅為末每服三錢水一鍾煎服如煩躁井水調下沸湯點服亦可不拘時六和湯治心脾不調氣不升降霍亂轉筋嘔吐泄瀉寒熱交作痰喘咳嗽胸膈痞滿頭目昏痛肢節浮腫嗜臥倦怠小便赤澀並傷寒陰陽不分冒暑伏熱煩悶或成痢疾中滿燥渴畏食婦人胎中亦可服中酒煩渴尤好砂仁半夏杏仁人參甘草各一錢赤茯苓藿香白扁豆姜炒木瓜各二錢香薷厚朴薑製各四兩每服一兩水二鍾姜三片棗二枚煎十味香薷飲消暑氣和脾胃香薷一兩人參陳皮白朮黃耆白扁豆甘草炙厚朴薑製炒黑木瓜白茯苓各五錢上為末每服二錢熱湯冷水任調下清暑益氣湯治長夏濕熱蒸人人感之四肢困倦精神減少懶於動作胸滿氣促肢節疼痛或氣高而喘身熱而煩心下膨悶小便黃而數大便溏而頻或痢或瀉不思飲食自汗體虛黃耆蒼朮升麻各一錢人參白朮神麯陳皮澤瀉各五分甘草炙黃柏酒炒麥冬當歸各三分葛根二分五味子九粒青皮二分上水二鍾煎服五苓散治中暑煩渴身熱頭痛霍亂吐瀉小便赤少心神恍惚不寧加辰砂澤瀉白朮茯苓官桂水一鍾半姜五片燈心十莖煎一方加車前子治暑風卒倒法凡人中暑先著於心一時昏迷切不可飲冷水並臥濕地其法先以熱湯或童便灌及用布蘸熱湯熨臍並氣海緒緒令暖氣透徹臍腹俟其蘇省然後進藥若在途中卒然暈倒急扶在陰涼處掬路中熱土作窩於臍中令人尿其內即蘇卻灌以人尿或掘地攪土漿飲之一方用大蒜三兩瓣細嚼溫湯送下大忌飲冷水用冷水灌身即死中濕脈或澀或細或濡或緩皆是中濕可得而斷凡濕有自外入者有自內得者陰雨濕地皆從外入治宜汗散久則疏通滲泄之食生冷濕面潼酪或飲食其症腫滿皆自內而出也宜實中淡味滲泄利小便其脈沉而細其自下起以重腿腳氣者亦當汗加味二陳湯治諸濕陳皮半夏茯苓甘草酒芩羌活蒼朮上水二鍾姜三片煎濕在上部加蒼朮在下加升麻內濕加豬苓澤瀉中焦濕與痛熱加黃連有實者亦用之肥白人因濕沉困倦怠是氣虛加蒼朮白朮黑瘦人沉困倦怠是濕熱加黃芩白朮芍藥生附湯治受濕腰疼腿痛附子生二錢五蒼朮炒一錢杜仲姜炒五錢厚朴薑製乾薑生白朮茯苓甘草各二錢五分上每服五錢姜三片棗一枚煎一方加羌活陰濕蠲痛湯蒼朮一錢五分羌活一錢茯苓一錢澤瀉一錢白朮一錢陳皮八分防己七分木通七分黃柏鹽酒炒七分牛膝酒焙八分檳榔五分大腹皮酒洗五分甘草三分上水二鍾煎至一鍾臨服入薑汁三茶匙清燥湯治六七月間濕熱大行子能令母虛濕熱相合而形庚大腸故寒涼以救之燥金受濕熱之邪絕寒水生化之源源絕則腎虧痿厥之病大作腰以下痿厥癱瘓不能行步兩足欹邪不正此藥主之黃耆一錢半黃連蒼朮各一錢五味子九粒白朮陳皮澤瀉各五分人參升麻各三分麥門冬甘草當歸生地神麯豬苓茯苓各二分黃柏一分上水一鍾半煎乳香黑虎丹治諸風寒濕客於經絡渾身骨節疼痛蒼朮二兩草五兩白芷五靈脂羌活川芎自然銅醋淬七次當歸各二兩乳香三兩上為末酒糊為丸梧子大百草霜為衣每服五十丸臨臥溫酒下忌熱物一二時三花神佑丸治一切水濕腫病大便實脹喘滿輕粉一錢大黃一兩牽牛二兩芫花醋炒甘遂大戟各五錢上為末滴水丸小豆大初服五丸每服加五丸溫水下病消為度羌活勝濕湯治背惡寒雖盛暑亦欲著綿人之背屬陽濕中太陽久而熱乃火也火起而痰隨之滲入於背兼以飲酒酒乃濕熱之物與病湊合濕痰結聚外雖惡寒其中濕熱也先燥濕次降火病則除矣內多太陽引經之劑且能勝濕蒼朮一錢半獨活一錢半甘草川芎藁本蔓荊子防風黃芩各一錢上水二鍾煎食遠服羌活續斷湯治脾腎氣虛涉水臥濕汗冷成痹濕盛經絡風濕偏枯膝腰腳疼痛腳重行步不順方見痛風門當歸止痛湯方見痛風門清濕湯治夏秋濕熱腰背胯痛身重怠惰身如板夾腳如沙墜黃柏微炒蒼朮浸炒羌活防己白朮陳皮薏苡仁白芍梔子炒川芎澤瀉茯苓神麯紅花甘草各等分水二鍾姜三片棗一枚煎服肩背痛通氣防風湯治肩背痛不可回顧此太陽氣鬱而不行以風藥散之脊痛項強腰似折項似拔此足太陽經氣不行也羌活獨活各一錢藁本防風甘草各五分川芎蔓荊子各三分水煎食遠服當歸止痛湯見痛風門蒼朮復煎散治寒濕相合腦痛惡寒煩悶脊骨胛眼痛膝臏痛脈沉洪蒼朮四兩水三大碗煎至碗半去渣再同煎下藥一鍾溫服羌活升麻澤瀉柴胡藁本白朮各五分黃柏三錢紅花少許上為粗末如上法煎服忌酒面腥冷舒經湯一名通氣飲子治臂痛不能舉有人常苦左臂痛或以為飲或以為風為濕諸藥不效繼以針灸俱不愈得此方而愈蓋是氣血凝滯經絡不行所致非風非飲非濕腰以下食前服腰以上食後服片子薑黃四兩甘草炙羌活各一兩海桐皮赤芍藥白朮各二兩上每服三錢水鍾半生薑三片磨沉香水少許溫服蠲痛湯治兩膊痛並胳膊肩痛皆痰之所為也陳皮八分甘草生用當歸五分桔梗米泔浸切茯苓各六分羌活五分薄桂二分前胡七分防風二分貝母七分用柳條燒灰水浸透糯米炒蒼朮五分泔浸上水一鍾半生薑三片棗二枚煎臨服再入薑汁竹瀝各三茶匙心脾痛脈訣沉弦細動皆是痛證心痛在寸腹痛在關下部在尺脈象顯然即胃脘痛雖不食不妨治而痛止不宜即食得食還痛必須三二服藥真心痛朝發暮死不治痛甚至唇口青黑脈必伏用溫藥不可用參朮又心腹之痛脈必沉細浮大滑數命必促備急丸治心腹大痛乾薑川大黃巴豆去皮各等分為末蜜丸梧子大每服三丸溫酒下順氣木香散治氣不升降胸膈痞悶時或隱痛及酒食過傷噫氣吞酸心脾刺痛女人一切血氣刺痛蒼朮桔梗茴香乾薑陳皮厚朴砂仁丁皮良薑肉桂甘草木香不見火草豆蔻姜三片棗一枚水煎服正氣天香散烏藥一錢半香附炒六錢陳皮紫蘇乾薑各六分水煎食遠溫服一方治九種心疼木通蒲黃赤芍五靈脂水煎臨服入鹽滷二匙通口服手拈散治心脾氣痛草果玄胡乳香沒藥各等合失笑散酒醋調服失笑散治心氣痛不可忍及