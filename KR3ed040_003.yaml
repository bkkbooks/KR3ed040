body:
  text: 卷三痓病多是氣弱有火兼痰宜人參竹瀝之類切不可作風治兼用風藥大率與癇病相似比癇病為甚為虛宜帶補廣按痓病發作則通身而戰掉皆因氣虛挾痰火所致正猶火炎而旋轉也火能燥物而使氣液之不足世人不諳誤認為風而用風藥風能勝濕是不足中而又見損也玉匱金鑰曰休治風休治燥治了火時風燥了夫火為風燥之本能治其火則是散風而潤燥何風燥之有哉此痓症所以宜補氣液而兼散痰火也以四君二陳天花粉南星黃芩黃柏多取效繼以安神丸癇病顛癇之脈浮洪大長滑大堅疾痰蓄心狂且如癇因驚而得驚則神不守舍舍空而痰聚也驚與癇宜吐大率行痰為主用黃連南星瓜蔞半夏尋火尋痰分多分少治之無不愈有熱者以涼藥清其心有痰必用吐藥吐後用東垣安神丸龍薈丸正宜服通泄散治風涎暴作氣塞倒僕苦丁香為末三錢加輕粉一字水半合調灌良久涎自出未出含沙糖自出墜痰丸治風癇天南星九蒸九曝為末薑汁糊丸每二十丸人參菖蒲麥冬煎湯下五癇丸治癲癇發作不問新久並宜治之全蠍去毒炒二錢皂角四兩捶碎水半升與白礬同熬干半夏湯泡七次二兩南星炮一兩烏蛇酒浸一夕去骨焙白附子炮半兩雄黃一錢另研白礬一兩蜈蚣半條去頭足焙硃砂一錢半另研麝香三錢另研白殭蠶一兩半炒去絲上為末薑汁煮糊為丸梧子大每三十丸薑湯送下引神歸舍丹治心氣不足並治心風附子一個重七錢以上炮去皮臍硃砂一兩水飛大天南星二兩生用上為末用豬心血並麵糊丸如梧子大煎萱草根湯下子午之交各一服追風祛痰丸治諸癇暗風防風天麻殭蠶炒去絲嘴白附子煨各一兩白礬半兩南星三兩一半化白礬水浸一半用皂角漿水浸半夏湯洗七次曬乾為末分作二分一分用生薑汁作曲一分用皂角洗漿作曲上為末薑汁糊為丸梧子大每七八十丸薄荷湯或淡薑湯食遠下硃砂安神丸治心煩懊憹心亂怔忡胸中氣亂心中痞悶食入反吐出硃砂四錢研黃連末五錢生甘草二錢半上為末蒸餅丸如黃米大每十丸唾津咽下滾痰丸治膈痰太甚作癇見痰門龍薈丸治肝火太甚作癇見脅門男婦風邪顛癇或狂走不知人事辰砂一兩雄黃一兩大附子一個重一兩上為末豬心血為丸梧子大每服九丸菖蒲湯下一方治風癇久服其痰隨小便出明礬細茶各等上為末煉蜜丸梧子大每三十丸茶清下顛狂脈訣顛癇之脈浮洪大長滑大堅疾痰蓄心狂脈虛者可治實則死又曰脈乍大乍小乍長乍短此皆邪脈神志昏亂癲屬陰狂屬陽癲多喜而狂多怒大率多因痰結於心胸間治當治心神開痰結亦有中邪而成此疾則以治邪法治之癲者神不守舍狂者如有所見經年不愈心經有損是為真病如心經蓄熱當清心除熱如痰迷心竅當下痰寧志若顛哭呻吟為邪所憑非狂也燒蠶紙酒下方寸卒狂言鬼語針大拇指甲下即止狂之為病少臥而不飢笑傲好歌樂妄行不休顛之為病意常不樂直視仰面曰僵覆面曰僕脈三部陰陽俱盛大率多因痰結於心胸間治當鎮心開痰結同癇法控痰丹治痰迷心竅時時顛狂如有所見甘遂去心紫大戟去皮白芥子各等上末煮麵糊丸梧子大曬乾臨臥薑湯下或熱水下三十丸利去痰飲為愈葉氏雄朱丸治男子婦人因驚憂失志或思慮過度氣結不散積成痰涎留在心包穰塞心竅狂言妄語叫呼奔走常服安魂定魄補心益氣硃砂一錢半白附子一錢雄黃明淨者一錢半上為細末豬心血丸梧子大別用硃砂為衣每三丸人參菖蒲湯下一方治狂邪無時披頭大叫欲殺人不避水火用苦參為末煉蜜丸梧子大每服十五丸煎薄荷湯下茯神散治婦人心虛與鬼交通妄有所見聞言語錯亂茯神一兩半茯苓人參石菖蒲各二兩赤小豆半兩上每服八錢水一鍾半煎食前通口溫服寧神化痰湯治男子婦人因氣惱或遇事受驚神出舍空痰留心竅心神不明妄言叫呼奔走失志等疾南星半夏橘紅赤茯桔梗枳殼甘草香附烏藥人參菖蒲茯神各等皂角少許水鍾半生薑七片煎驚悸怔忡心中驚悸脈必代結飲食之悸沉伏動滑驚悸者血虛驚悸有時以硃砂安神丸怔忡者血虛怔忡無時血少者多有思慮便動屬虛時作時止者痰因火動瘦人多是血少肥人多是痰尋常者多是痰真覺心跳者是血少四物硃砂安神之類怔忡者心中不安惕惕如人所捕茯苓飲子治痰飲蓄於心經怔忡不已赤茯苓半夏麥門冬陳皮各一兩沉香不見火甘草檳榔各五錢上每服八錢薑三片水煎服養心湯治憂愁思慮傷心驚悸不寧治停水怔忡加檳榔赤茯苓黃耆白茯茯神半夏曲當歸川芎各五錢甘草四錢辣桂遠志去心薑汁炒柏子仁五味子酸棗仁人參各二錢半上每服三錢薑三片棗一枚煎加味定志丸治痰迷心膈驚悸怔忡遠志二兩人參一兩菖蒲二兩白茯三兩琥珀鬱金各一兩上為末煉蜜丸梧子大硃砂為衣每三十丸米湯下加味硃砂安神丸治血虛心煩懊憹驚悸怔忡胸中氣亂硃砂五錢飛另研黃連酒洗六錢甘草炙二錢半生地一錢半當歸二錢半上四味為末蒸餅丸黍米大硃砂為衣每五十丸唾津送下益榮湯治思慮過度耗傷心血天君不寧怔忡恍惚夜多夢寐小便赤白濁當歸黃耆小草酸棗仁炒柏子仁炒麥冬去心茯神去木白芍紫石英各一兩另研木香不見火人參甘草炙各五分上每服四錢水一鍾半薑五片棗一枚煎健忘丹治心虛損遇事多驚作事健忘讀誦詩書健忘猶可服遠志去心一兩石菖蒲去毛一兩黃連薑炒五錢歸身酒洗二兩枸杞甘州二兩酸棗仁炒一兩麥冬去心一兩甘菊花五錢生地黃五錢人參五錢上煉蜜丸硃砂三錢為衣每五十丸茶下天王補心丹寧心保神益血固精壯力強志令人不忘除怔忡定驚悸清三焦化痰涎祛煩熱療咽乾育養心神人參去蘆五錢當歸酒浸一兩五味子一兩麥冬去心一兩天冬去心一兩柏子仁一兩酸棗仁炒一兩白茯苓去皮五錢玄參五錢丹參五錢桔梗五錢遠志去心五錢生地酒浸四兩黃連酒炒二兩上為細末煉蜜為丸梧桐子大硃砂五錢另研為衣煎燈心竹葉湯臨臥下一方多石菖蒲熟地黃杜仲百部茯神甘草六味歸脾湯治思慮過度勞傷心脾健忘怔忡方見下血門虛損脈理提綱曰氣虛脈細或緩而無力左手弱血虛脈大或數而無力右手脈弱陽虛脈遲陰虛脈弦真氣虛脈緊指男子久病氣口脈弱則死強則生女人久病人迎脈強則生弱則死四君子湯補氣和胃進食白朮去梗米泔浸切土炒用白者人參去蘆白茯苓去皮甘草炙各等水煎溫服四物湯補血活血調經當歸去蘆酒洗白芍藥酒炒川芎地黃男子多用熟女人多用生酒製水煎溫服八物湯平補氣血調和陰陽即四君子四物湯二方合用十全大補湯治男子婦人諸虛不足五勞七傷此藥性溫平補常服生氣血壯脾胃即前四君子四物湯內加黃耆肉桂薑三片棗二枚水煎溫服養神湯治勤讀誦勞苦清爽精神天門冬去心麥門冬去心各一錢歸身一錢丹參五分貝母去心一錢黃連五分白朮一錢知母去毛酒炒一錢陳皮一錢菖蒲五分五味子九粒薑三片水煎食遠服柴胡四物湯治血虛陰虛午後或夜分發熱即四物湯合小柴湯相合服有汗加地骨皮無汗加牡丹皮雙和散補益氣血治虛勞少力大病後宜服黃耆一兩地黃一兩當歸一兩川芎一兩肉桂七錢半芍藥七錢半甘草炙八分人參二錢上水一鍾半生薑三片棗一枚煎溫服黃耆益損湯治諸虛勞倦肉桂地黃半夏甘草各三錢石斛當歸川芎黃耆白朮各一兩芍藥一兩半五味子五錢木香三錢熱加柴胡薑五片棗二枚水煎服補陰散即滋陰降火湯加麥門冬遠志去心一切虛損俱宜服作丸服亦好一方治陰虛火動盜汗發熱咳嗽唾血身熱脈數肌肉消瘦色欲成勞者川芎一錢地黃一錢芍藥炒一錢三分當歸一錢三分黃柏蜜水拌炒七分知母蜜水拌炒一錢甘草炙五分白朮一錢三分天冬去心一錢陳皮七分乾薑炒黑三分薑三片水煎服夢遺精滑加牡蠣龍骨山茱萸若咳嗽盛加桑白皮栝蔞仁馬兜鈴五味子若痰盛加薑半夏栝蔞仁若盜汗加牡蠣酸棗仁浮小麥若潮熱盛加桑白皮沙參地骨皮若赤白濁加白茯苓一錢黃連五分若衄血咳血加桑白皮黃芩梔子若嗽血痰血加桑皮貝母黃連栝蔞仁炒若嘔血吐血出於胃加山梔黃連乾薑蒲黃薑汁韭汁若咯唾血出於腎加桔梗玄參側柏葉勞瘵不治症形削氣多趺腫溏泄面紅發喘古今不治五福延壽丹治男子女人諸虛百損五勞七傷未及半百而鬚髮早白行路艱難形容羸瘦眼目昏花遠年近日咳嗽吐痰見血夜夢遺精並婦人久不生育服之有子甚多五味子六兩肉蓯蓉四兩酒浸焙牛膝三兩酒浸菟絲子酒浸炒二兩杜仲薑炒斷絲三兩天冬去心二兩廣木香一兩巴戟去心二兩山藥二兩鹿茸酥油炙透一兩車前子炒二兩菖蒲焙一兩澤瀉去毛一兩生地一兩酒洗熟地一兩酒製人參去蘆一兩乳香一兩另研沒藥五錢另研枸杞子一兩大茴炒二兩覆盆子一兩赤石脂煅一兩地骨皮二兩杏仁去皮尖一兩山茱萸去核二兩柏子仁一兩川椒去目合口炒七錢川楝肉炒一兩遠志去心一兩龍骨煅五錢白茯苓去皮一兩當歸酒洗一兩共三十二味為細末煉蜜丸梧子大每三十丸空心鹽湯或鹽酒下大造丸紫河車一具用男初胎者米泔水洗淨焙敗龜板童便浸七日酥炙透二兩黃柏去皮鹽酒炒一兩半杜仲去皮酥炙斷絲一兩半牛膝去苗酒浸曬乾一兩二錢生地黃四兩入砂仁末六錢白茯苓重二兩者稀絹袋盛藥沙器煮乾添酒七次去茯苓天門冬去心一兩二錢麥門冬去心一兩二錢上末連地黃石臼中搗極勻酒米糊丸梧子大空心臨臥鹽湯白湯任下冬月用酒送男子遺精婦人帶下並加牡蠣一兩五錢一方加人參一兩夏月加五味子五錢婦人服加當歸二兩制河車法先用米泔水洗過將河車輕輕擺開換洗泔五次不動筋膜此乃初結之真氣也將竹器全盛長流水中浸一刻取生氣提出以瓦小盆全盛於木甑內緩之蒸之極熟如糊取出先傾自然汁在藥末內略和勻此天元正氣汁也河車放石臼內木椎擂千下如糊樣通將前藥汁末同和勻再搗千餘杵衆手為丸此全天元真氣以人補人最妙世所少知用火焙酒煮及去筋膜大誤也滋陰百補丸專治女人氣血勞傷不足陰陽不和乍寒乍熱心腹疼痛不思飲食尪羸乏力並皆治之香附子一斤去毛分四分酒浸四兩鹽水浸四兩醋浸四兩童便浸四兩俱炒乾益母草四兩端午日採當歸六兩川芎四兩熟地四兩芍藥三兩炒白朮四兩人參一兩茯苓二兩玄胡二兩炒甘草炙一兩上末煉蜜丸梧子大每五六十丸空心砂仁湯或醋或酒俱可送下又滋陰百補丸治丈夫女子諸虛百損扶陰助陽健脾胃聖藥也浸酒服尤妙枸杞甘州二兩杜仲薑炒斷絲二兩當歸酒洗二兩南知母去毛酒炒二兩生地酒洗二兩熟地酒洗二兩人參去蘆二兩牛膝酒洗焙一兩乾山藥一兩山茱萸去核一兩菟絲子酒煮一兩黃柏酒炒三兩瑣陽酥炙一兩五麥冬去心一兩天冬去心一兩如心神不寧眩暈惡逆加菖蒲茯神遠志蓮肉薑半夏各一兩上各制淨稱足分兩為細末外將好白朮一斤去梗水洗二三次切成片水七八碗熬至二碗留汁再將渣用水五碗再熬至二碗去渣不用將前後汁四碗共熬至二碗半如稀糊和前藥末丸如梧子大每五六十丸鹽湯或鹽酒送下滋陰降火湯即前補陰散三補丸治上焦積熱泄五臟火黃芩黃連黃柏各等分上為細末蒸餅丸一方治酒色過傷少陰黃柏炒一兩半黃連炒一兩條芩炒五錢龜板酒炙