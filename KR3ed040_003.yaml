傷風入里南星半夏川烏草烏天麻各二錢硃砂雄黃各一錢上為末每服一錢避風處熱酒調下取汗愈如聖散白芷川芎防風細辛雄黃蒼朮烏頭兩頭尖上為末熱酒調服二錢忌油膩接骨方先服甘草歸尾紅花麻黃各一錢酒煎服不飲酒水煎服後用牛角肉灰二錢研細酒調空心服能接骨疝病睪丸連小腹痛者是也有睪丸痛者有痛在五樞穴者或無形無聲或有形如瓜有聲如蛙皆以為寒也專主肝經與腎經絶無相干宜灸大敦三陰交二穴治方枳實橘核山梔炒山楂吳茱萸湯泡濕勝加荔枝核有瘀血加桃仁挾虛者加參朮為君按之不定者是寒疝囊冷結硬得於寒濕而發冬月者加吳茱萸桂枝乾薑水疝腎囊腫痛陰汗時出囊腫如水晶得於飲食醉酒者加澤瀉豬苓茯苓筋疝陰脛腫脹或莖中痛痛極則癢或挺縫不收得房勞所致加炒白朮茯苓黃連氣疝其狀上連腎區下及陰囊或因號哭忿怒氣鬱而發者加柴胡青皮香附狐疝其狀如瓦臥則入小腹行立則出小腹入囊中者加青皮香附蒼朮㿗疝陰囊腫縋如升如斗不癢不痛得之地氣卑濕加白朮茯苓澤瀉豬苓蒼朮加減柴苓湯治諸疝和肝腎順氣消疝治濕之劑柴胡甘草半夏茯苓白朮澤瀉豬苓山梔炒山楂荔枝核上各等分薑三片水煎空心服一方烏頭梔子各等水煎服按之不定屬虛加桂枝薑汁丸服此乃劫劑茴香丸又名回春丸治疝氣神效茯苓一兩白朮一兩山楂子一兩枳實八錢八角茴香炒一兩吳茱萸一兩橘核三兩荔枝核一兩上為末煉蜜丸每丸重一錢五分空心細嚼薑湯下疝氣神方其病甚至氣上衝如有物築塞心臟欲死手足厥冷二三服除根硫黃銚中溶化投水中去毒研荔枝核炒黃為末陳皮各等上末飯丸梧子大每十四丸空心酒下其疼立止自覺痛不能支持略加六丸再不可多用奪命丹治遠年近日小腸疝氣臍下撮痛外腎偏墜腫硬陰間或濕癢抓成瘡癬吳茱萸一斤酒浸四兩醋浸四兩湯浸四兩童便浸四兩各浸一宿焙乾澤瀉去毛二兩上為末酒煮麵糊丸梧子大每服空心五十丸溫酒鹽湯任下一方治小腸偏墜用生薑二兩五錢去皮一半留皮一半共搗爛取汁傾在熱酒內加鹽少許空心溫服不過三服愈小腸疝氣方用經霜老絲瓜燒灰為末空心熱酒調下汗出神效橘核散治小腸氣痛堅硬此乃肝腎二經皆因嗜欲內戕腎家虛憊故陰陽不相交水火不相濟而沉寒痼冷凝滯其間脹腹作痛頑痹結硬勢所必至也橘核為末每服二錢空心溫酒或鹽湯任下五積散亦治身痛發熱方見寒門一方治偏墜腫痛用花椒四兩炒布包尉腫冷更易一方小兒陰囊腫痛及莖腫用生甘草汁輕粉蚯蚓泥研調敷一方治疝氣不甚痛氣不升降膈氣好怒胸痞有痰減食南星薑製五錢半夏薑製五錢黃柏酒炒四錢蒼朮鹽水炒五錢山楂肉五錢桂枝一錢神麯炒三錢青木香二錢吳茱萸鹽湯炒三錢大茴炒二錢小茴鹽水炒五錢川楝肉炒四錢枳實炒四錢故紙炒二錢香附炒三錢澤瀉去毛炒五錢上末酒糊丸每五十丸空心鹽湯或酒送下葶藶木香散治疝氣外腎腫痛亦好又治水腫腹脹內外濕熱太甚小便赤澀大便滑泄此藥下水濕消腫脹止泄利小便聖藥也葶藶赤茯苓豬苓白朮各二錢半木香五分澤瀉木通甘草各五分桂二錢半滑石三兩上為末每服三錢白湯調服一方治疝氣偏墜疼痛諸疝皆治乳香一兩肉桂三錢大茴一兩小茴一兩沉香四錢廣木香一兩青石三錢川楝肉一兩先將青石煅酒淬三次就將淬青石酒加蔥白調藥末一錢八分空心服二香定痛散廣木香小茴香川楝子肉各等為末每服二錢熱酒調下連三服效一方治疝氣危急者全蠍去毒玄胡索等分末每一錢五分空心鹽酒送下大便不通一方治大便不通用豬脂二兩水一碗煮湯飲之立通一方用蜣螂入巴豆燒存性為末酒調四分服一方用豬膽導法見傷寒門一方煉蜜導法見傷寒門一方蔥白導法見傷寒門三化湯見中風門大小承氣湯見傷寒門一方治大便不通用獨頭大蒜煨熟去皮綿裹塞糞門內一方治大小便關格不利用皂莢燒研末粥飲下三錢小便不通有血虛有痰有風閉有實熱氣閉用參耆升麻等先服後吐或參耆藥中探吐血虛四物湯或芎歸中探吐亦可痰多二陳湯先服後吐若痰氣閉塞加木通一云木香香附探吐以上俱用探吐以提其氣氣升則水自降蓋氣承載其水也有實熱者當利之沙糖湯調牽牛末二三分或山梔之類有熱有濕有氣結於下宜清宜燥宜升有孕之婦多患小便不通胞被胎壓下故也轉胞論用四物湯加參朮半夏陳皮甘草薑棗煎湯空心服一婦人脾痛後患大小便不通此是痰隔中焦氣滯於下焦以二陳湯加木通服後煎渣服探吐之脈訣舉要鼻頭色黃小便必難脈浮弦澀為不小便蒲黃湯治心胃有熱小便不通赤茯苓木通車前子桑白皮炒荊芥燈草赤芍甘草微炒蒲黃生滑石共為末蔥白煎湯調下二錢葵子湯治膀胱實熱腹脹小便不通赤茯去皮豬苓去皮葵子枳實麩炒瞿麥滑石木通黃芩車前子甘草炙各等上每服四錢薑五片水煎空心服海金沙散治小便淋漓及下焦濕熱氣不施化或五種淋疾癃閉不通海金沙研木通瞿麥穗滑石通草各半兩杏仁去皮尖麩炒一兩燈心二十莖水煎宣氣散治小便不通臍腹急痛甘草木通各三錢梔子二錢葵子滑石各一錢上為末燈心湯空心調下二三錢八珍散治大人小兒小便不利或不通大黃木通滑石粉草瞿麥山梔黃芩荊芥上為末每服一錢煎薄荷湯調下小兒減半八正散加木香治膀胱不利為癃閉者小便閉而不通方見淋門一方治膀胱有實熱小便不通用朴硝研每空心煎茴香湯調下二錢一方治小便不通百法不能取效此方最好陳皮半夏茯苓豬苓澤瀉白朮木通黃芩梔子各二錢升麻三分甘草二分水煎空心服少時以雞翎探喉吐之得利而止妙在吐法一方用土狗和蒜搗爛貼臍上一方用蚯蚓搗爛冷水濾濃汁半碗服立通又方用豬膽投熱酒一鍾服立通一方用鹽填滿以艾灸之草蜜湯生車前草搗取自然汁半鍾入蜜一匙調服腳氣羌活導滯湯治腳氣初發一身盡痛或肢節腫痛便溺阻隔或行步艱難以此藥導之後服當歸拈痛湯羌活一錢獨活一錢防風一錢二分當歸一錢大黃酒浸一錢半枳實炒一錢水煎空心服生料五積散方見寒門蘇子降氣湯方見氣門東垣健步丸治腳氣神效羌活柴胡防己甘草炙滑石炒苦參栝蔞根各半兩防風三錢川烏一錢上為末酒糊丸麻子大每服百丸空心荊芥煎湯下一方加蒼朮黃芩黃柏牛膝治痿亦好足腿痛一方四物湯加知母黃柏牛膝煎服一方治腳氣纍試神效麻黃去根留節炒三兩殭蠶三兩炒為末沒藥乳香各五錢丁香一錢上各研為末每服一兩好酒調下取醉汗出至腳為度候汗自干即愈後用五枝湯洗桃柳梅槐桑煎湯先飲好酒三杯洗腳住痛為妙一方轉筋皆屬血熱四物湯加酒芩紅花煎服筋動於足大指上至大腿近腰結此奉養厚因風寒而作再加蒼朮南星檳蘇散治風濕腳氣疼痛不已此藥疏通氣道香附便浸陳皮蘇葉木瓜各二錢檳榔一錢半甘草三分上水二鍾蔥三根煎空心服凡患腳氣切不可淋洗及服補藥一方加五加皮一方用大附子生為末唾津調和成餅子貼湧泉穴緩緩以艾灸引熱下行妙一方當歸拈痛湯亦好方見痛風門痿病起於肺熱有濕熱者有濕痰者有血虛有氣虛有瘀血者不可作風治東垣健步丸方見腳氣門一方治氣虛痿弱人參白朮甘草黃芩黃柏蒼朮空心水煎服送補陰丸尤好一方治濕痰痿弱蒼朮白朮黃芩黃柏竹瀝薑汁陳皮半夏茯苓甘草上用水一鍾半煎空心溫服一方治骨軟風腰膝疼行履不得遍身瘙癢大何首烏牛膝各一斤酒浸七日曬乾臼內搗為末煉蜜為丸梧子大每三五十丸空心溫酒或白湯下補肝湯治前陰如冰冷並陰汗兩腳痿弱無力方見虛損門
