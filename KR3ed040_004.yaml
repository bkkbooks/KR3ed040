茶研細隔紙略焙厚朴去粗皮洗紫厚香者佳有生用有薑汁浸炒者黃柏去粗皮洗切有酒炒蜜炙鹽水炒有生用有臘月豬膽炙透用者青皮四花圓緊者好水泡去穰切焙有曬乾用有醋炒用大腹皮揉去土有酒洗有薑汁浸去毒有連子用者牡丹皮去木水洗有醋浸焙有酒拌蒸用者桑根白皮刮去赤有蜜拌炒忌鐵器東行根出土者有毒茯苓赤者利水白者亦利水帶補去皮有焙用有為末水澄去筋膜曬乾用檳榔白而堅者好有火煨切有酸米飯裹濕紙包火煨者有生用有石灰制者枸杞子甘州紅小者佳去萼酒浸用同菊花拌焙去菊花山楂南者佳水潤蒸去核草果去皮膜切焙有面裹煨者山梔子紅小者佳有用仁用皮有仁皮同用者炒研碎川楝子去皮核焙槐花水洗去枝焙乾收訶子去皮核煨有生用者郁李仁泡去皮壓去油研杜仲去粗皮切薑汁拌炒絲盡有酥油拌炒者有酒浸炒者桃仁杏仁湯泡去皮尖炒有生用有連皮尖用者各研雙仁有大毒不可用皂角炙去黑皮子另研大小不等各有用皂角刺切焙木通大者色黃白者佳去皮通草白者佳二味通氣木香廣者佳有不見火為末用者有火煨有水研用者青木香同製法吳茱萸去枝滾水加鹽泡五次去毒炒用山茱萸水泡去核用肉焙側柏葉按四時方位採焙有陰乾生用者柏子仁水浸略蒸晴日曬爆開口取仁焙另研川椒去枝梗合口及黑子焙出汗地上盆合一時去火毒為末用巴豆去皮心膜有生用焙用連皮用壓去油取霜用有醋煮用者陳皮廣者紅者佳去白利痰用連白入脾胃有鹽水浸焙者丁香去頂上小泡子及枝梗另研母丁香力大肉豆蔻麵裹煨去油切椿根白皮切焙乳香明淨者佳黏則難研同燈草研或隔紙略焙研琥珀同豆腐漿水煮百沸略炙另研拾芥者真官桂補用肉厚者下行和榮衛上行橫行用枝俱銼有不見火用者石膏軟白者佳有同甘草水澄用有生用者有火煅用俱研細赤石脂火煅研細有生用者寒水石有薑汁煮用有火煅有生用者俱為末自然銅火煅紅醋淬七次研細用硇砂醋和麵包慢火煨面熟殺毒針砂傾銀鍋內火煅紅醋淬人言醋浸一宿除毒不可輕用亦不可買賣人手足甲新瓦上焙存性另研人糞乾者研水調服殺杏仁毒極效有燒用者人發童子年壯少者好燒研人小便二三歲以上十歲以下色清者佳天靈蓋年久者好火煅另研人牙火燒另研龍骨五色具者佳白者黏舌者好火煅另研亦有生用者虎骨前腿脛骨髓滿者佳酥油炙透有酒炙者象牙生者好燒存性另研年久有油者不堪龜板去裙酥油炙透有酒炙者鱉甲醋炙或酒炙透去裙全蠍去毒水洗去鹽焙五靈脂為末水澄去土焙有生用者蜈蚣金頭赤足者佳去頭足炙透蟬蛻去嘴足翅土焙研白花蛇烏梢蛇酒浸去皮骨焙穿山甲沙土炒另研珍珠新鮮者用綿絮包裹火燒不振另研牡蠣左顧者佳煅研斑蝥紅娘子去頭足翅水略潤同糯米微火炒透熟去米另研酒用無灰釅者佳醋用米造陳者佳油用白芝麻者佳水用甜井新汲者佳凡治病在頭面手梢上部者用酒炒藥治咽喉以下肚臍以上中焦者用酒浸曬在臍下至足者多用生藥凡熟升生降之意製藥用心不可太過過則反失藥力凡炒藥大中小分三等作三次炒庶無生熟之患凡七八九月遇晴明天氣預製咀片過冬冬月天寒水冰制則失藥力萬曆十三年春仲月吉臨邑清泉張潔選集
