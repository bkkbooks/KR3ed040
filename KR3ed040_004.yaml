body:
  text: 卷四諸瘡癰疽只是熱勝血陰陽相滯而生中年以後不宜有此病脈訣曰癰疽浮數惡寒發熱若有痛處癰疽所發脈數發熱而痛者陽不數不熱不痛者陰瘡發癰之脈弦洪相搏細沉而直肺肝俱數真人活命飲治一切癰疽惡瘡惡候發背發腦發髭髮鬢發脅髮乳癤毒騎馬肚癰腿癰氣塊血塊面目手足浮腫俱治穿山甲三片蛤粉炒天花粉一錢甘草節乳香白芷赤芍貝母各一錢防風七分沒藥皂角刺各五分歸尾酒洗陳皮各錢半金銀花三錢上用金華酒鍾半煎服連進二三服初覺腫毒加大黃木鱉子潰後及虛老之人去大黃木鱉子加生黃耆水煎服槐花酒治發背及一切疔瘡腫毒不問已成未成但焮痛者並治之用槐花洗淨微炒黃乘熱入好酒二鍾煎十餘沸連服二三服即愈乳癰尤好拔毒疔蒼耳散用蒼耳根莖苗子燒灰為末醋泔靛水和泥塗上數次效忍冬藤酒治癰疽發背初發不問何處及婦人乳癰常服此藥神效忍冬藤即金銀花苗五兩生甘草節一兩用沙罐內水二碗煎至一碗再入好酒一碗再煎數沸去渣作三次溫服一日服盡如瘡重一日煎兩劑服取葉研爛白酒調塗四圍留口內疏黃連湯治瘡皮色腫硬發而嘔大便燥結脈洪實以此微利之黃連芍藥當歸檳榔木香黃芩梔子薄荷桔梗甘草各一兩大黃二兩半上每服一兩水一鍾半生薑三片煎服益氣養榮湯治瘡潰後可常服生肌內不致生他患甚好白朮炒二錢人參陳皮香附甘草白茯熟地貝母當歸桔梗白芍各一錢如口乾加五味子麥門冬往來寒熱加柴胡地骨皮膿清加黃耆膿多加川芎白芷肌肉生遲加白蘞肉桂上水一鍾半煎至一鍾看瘡在上下食前後溫服蠟礬丸消癰疽乳癰腸癰托裡消毒及一切惡瘡又固臟腑止疼痛不損膜真黃蠟二兩明礬三兩先將蠟微火化離火入礬末中和勻衆手丸梧子大每服二三十丸空心日中臨臥各一服溫水送下忌雞魚羊肉雞子治癰疽收瘡口生肌散白龍骨煅白斂乳香沒藥上研極細摻之粗則反痛一方治乳癰未潰法甘草節青皮栝蔞仁金銀花當歸沒藥皂角刺連翹川芎黃連各等分水煎食遠熱服加酒半鍾尤好一方治乳癰各樣瘡已潰者人參黃耆川芎當歸白芍青皮栝蔞甘草節白芷上各等水一鍾半煎服一方凡乳癰發痛者生於心也俗呼吹你是也吹者風也風熱結於乳房之間血脈凝注久而不散潰腐為膿宜用益原散生薑湯調下冷服或新汲水調服晝夜可三十次自解神仙太乙膏治癰疽及一切瘡毒不問年月深淺已未成膿者並治之如發背先以溫水洗淨軟帛拭乾用緋絹攤貼之更為丸用冷水送下血氣不通溫水下赤白帶當歸酒下喉痹及咳嗽纏喉風並用新綿裹置口中噙化下一切風赤眼捏作小餅貼太陽穴外以山梔子湯下打撲傷損外貼內服橘皮湯下腰膝痛貼患處鹽湯下唾血者桑白皮湯下以蛤粉為衣其膏可收十年不壞愈久愈烈又治瘰癧瘻瘡並用鹽湯洗貼酒服凡婦人經脈不通甘草湯下一切疥瘡用麻油煎滾取出少許和膏塗之虎犬蛇蠍湯火刀斧傷者皆可內服外貼神效玄參當歸赤芍肉桂大黃生地黃白芷真正者各淨稱一兩上用真香油二斤入沙鍋炸藥老黃色去渣稱淨油二斤入飛丹一斤熬用水澄膏治瘡發熱焮腫毒疼痛大黃黃柏鬱金白芨南星朴硝黃蜀葵無亦可上為細末以新汲水調藥二錢攪勻澄底去水攤貼一方治發背陰瘡不焮腫熱者是用雄雞冠以剪剪其尖少許頭向下滴血入瘡中血盡再換不過五六隻止痛消毒數日自愈一方治發背瘡神效用生蜜合生面為餅貼瘡上待餅乾再換三五次即愈瘡有口就口上貼之生肌散治一切癰疽惡瘡潰後斂口生肉赤石脂煅海螵蛸龍骨煅各一兩乳香沒藥血竭各二錢輕粉一錢硃砂鬱金黃丹飛黃連白芷各五分上為極細末摻口上用燈心數莖上用太乙膏貼拔毒散敷各樣初生腫毒焮熱者寒水石三兩石膏二兩黃柏一兩大甘草一兩上為極細末水調敷之一方治各樣腫毒初起熱盛者用五倍子炒存性百草霜等分一方無百草霜加大黃硝為末熱醋調敷神效內托千金散治腦背癰疽乳便毒等惡瘡人參當歸黃耆芍藥川芎甘草栝蔞白芷官桂桔梗金銀花防風各等上用水二鍾煎至七分入酒半鍾去渣溫服瘡痛甚者加當歸芍藥或乳香日進三服一服之後瘡口內有黑血出者或遍身汗出皆藥之功效如病勢惡者須稱藥一兩水一碗煎服未成者自散已成膿者自潰一方治濕熱瘡薄皮瘡臘月豬膽炙黃柏為末一兩入輕粉五分同研灣水調敷一方用蒲黃輕粉滑石敷亦好神效散治一切惡瘡醫所不識者水銀油研不見星黃柏黃連松脂膩粉甘草土蜂窩同研油調敷一方治肺受風熱毒氣遍身生瘡或濕爛用苦參為末粟飯丸梧子大每服五十丸米湯下忌口日二次用完肌散亦治頭練瘡用定粉枯礬黃連乳香龍骨各一錢黃丹輕粉各一兩為末敷之上為極細末每上藥淨末一兩煅天靈蓋末一兩同研洗瘡敷一方治各樣惡瘡未破者散風熱清心解毒為主不可用辛熱之藥連翹梔子歸身尾川芎芍藥皂角刺黃連黃芩荊芥薄荷金銀花羌活防風甘草節玄參大黃在頭面加升麻三分在眼鼻口面加白芷葛根在耳側加柴胡青皮在背後倍加羌活痛甚加乳沒上每服一兩用水二鍾煎至一鍾看上下食前後服一方治各樣發背惡瘡已潰出膿後為之走氣血當用十全大補湯加減多服自安忌苦寒之藥外用神仙太乙膏貼有神妙之功去白朮加白芷一方去各樣瘡痕衣魚鷹屎殭蠶同研細唾津調頻敷消乳香善應膏治癰疽發背諸般惡瘡打撲傷損筋骨疼痛瘀血年久爛瘡頑瘡小兒癖塊並宜貼之乳香沒藥血竭各三錢真阿魏二錢真麝香一錢以上五味另研細待膏成後入之大黃黃連黃柏防風官桂芍藥白芷玄參當歸連翹巴豆蘇木大楓子各一兩木鱉子十二個穿山甲八片槐柳各二十寸用炸藥後淨香油一斤飛過黃丹一斤冬月減丹一兩如常熬法收用痔瘡主方條芩人參黃連生地槐角子當歸川芎升麻枳殼大便祕加酒少許上水一鍾半煎至一鍾空心熱服一方治痔漏遠年不愈者先以雞子七個每個入明礬一分飯內蒸熟每清晨服一枚次用此方黃連末八兩枳殼末六兩甘草末四兩雄豬臟一副切作四五段入藥在內兩頭線札煮一日取出聽用後存汁一碗將糯米一升大麥仁一升拌勻炒熟連前藥豬腸搗千下為丸如梧子大每服一百四五十丸早中晚一日三次服忌燒酒椒蒜煎炒物膽槐丸十月上己日取槐子肥實者用新瓦盆二個如法將槐子入盆中上下叩合埋於陰牆下三尺深預先尋下黑牛膽五七個於臘月初八日取出槐子裝於膽中有風無日處高吊陰乾次年清明日出於磁罐內盛之每日空心白湯送下一粒二日二粒漸加至十五日服十五丸止十六日退一丸以後一日退一粒周而復始不問遠年近日痔漏並皆治之又滋養腎水明眼目輕身體健加味槐角丸治痔漏通用又治腸風下血槐角子二兩生地黃煮二兩歸身黃耆各一兩川芎阿膠各五錢黃芩黃連枳殼秦艽防風連翹地榆升麻各一兩白芷五錢上為細末煉蜜為丸梧子大每五七十丸空心米湯或溫水任下熏洗方五倍子朴硝桑寄生蓮蓬水煎入白礬末先熏後洗腫者用木鱉子仁五倍子末敷甘草煎湯洗可救一時之苦急痛又方槐花艾葉荊芥枳殼各炙白礬一錢煎湯先熏後洗又方瓦松半斤黑礬一合熬水先熏後洗冬瓜皮煎湯洗亦好又方韭菜熬水洗亦好又曲曲菜根煎湯洗一方治痔痛膿水不幹蜣螂一枚陰乾冰片少許共為末紙捻捻入孔中漸漸生肉藥捻自退出一方用乳香沒藥硃砂雄黃麝香各二分熊膽一分研細田螺一個以麝入在內俟螺水如緑豆粉少許為錠子量瘡大小深淺塞之漸漸生肌瘰癧屬血氣痰熱必起於少陽一經不守禁忌延及陽明大抵食味之厚鬱結之積曰毒曰風曰熱皆此三端拓引變換須分虛實實者易治虛者可慮以其屬膽經主決斷且氣多血少婦人見此若月經如期不作寒熱易治轉為潮熱危矣自非斷欲食淡神仙不治夏枯草湯治瘰癧馬刀不問已未潰或日久成漏用夏枯草六兩水二大鐘煎至七分去渣食遠服此生血治瘰癧之聖藥也虛甚當煎濃膏服並塗患處多服益善兼服十全大補湯加香附貝母遠志尤善本草云夏枯草大治瘰癧散血氣有補養厥陰血氣之功能退寒熱虛者可服實者以行散之藥佐之一方用煅過牡蠣四兩玄參三兩為糊丸梧子大酒下三十五丸藥盡患除有加甘草二兩散腫潰堅湯治馬刀瘡結硬如石自耳下至血盆中或至肩上或於脅下皆手足少陽經中及瘰癧遍於頦或至頰車堅而不潰在足陽明經所出或二瘡已破流膿水及生癭瘤大如升斗久不潰消者並皆治之知母黃柏並酒炒昆布洗栝蔞根酒洗桔梗各五錢廣朮炒三稜煨連翹各三錢升麻六分黃連白芍葛根各二錢歸尾柴胡甘草各五錢龍膽草酒洗四錢黃芩一錢半生半炒海藻五錢上每服七錢水二鍾先浸半日煎至一鍾足高頭低臥徐徐咽之升陽調經丸治瘰癧神效升麻八錢葛根五錢龍膽草酒炒五錢黃連五錢歸尾三錢桔梗五錢連翹五錢芍藥煨三錢黃柏酒炒五錢黃芩酒炒五錢廣朮煨五錢甘草炙五錢三稜酒炒五錢生芩四錢夏枯草五錢上用一半為末煉蜜丸梧子大每服一百二十丸白湯下一半作片每服五錢水煎服太乙膏貼癧子瘡神效片腦一錢另研輕粉乳香各二錢另研麝香三錢另研沒藥四錢黃丹飛過五兩上用清油一斤先下丹熬用柳枝攪又下憨兒蔥七枝先下一枝熬焦去蔥再下一枝蔥盡為度下火不住手攪冷熱得所入腦子等藥攪勻磁器盛收一方治瘰癧瘡潰後用膏貼乳香沒藥大黃各二錢半赤石脂二錢兒茶三分輕粉二分冰片半分另研上為細末先以菜油二兩煎滾入黃蠟一兩化入藥末攪勻下火入冰片再攪收一方治瘰癧用蓽麻子炒熟去皮爛嚼臨睡服二三粒漸加至十數粒甚效一方治瘰癧已未潰久服自消土茯苓白蘚皮白牽牛各二錢五分皂角子七個水二鍾煎八分食遠服飛龍奪命丹專治疔瘡發背胸疽吹乳癰疽一切無名腫毒惡瘡無頭者服之有頭不痛者服之知痛已成者服之立愈危急者服之無失蟾酥乾者酒化二錢好雄黃二錢血竭一錢乳香二錢沒藥二錢輕粉五分膽礬一錢寒水石一錢麝香五分銅緑二錢海羊即蝸牛連殼二十一個硃砂一錢為衣上為末先將海羊研如泥調和前末為丸緑豆大如丸不就加好酒杵千杵每服三丸先用蔥白三寸病人自嚼爛吐於男左女右手心將嚼爛蔥裹藥無灰酒送下飲酒三四鐘好於避風處臥以衣蓋之約人行五七里用熱酒數杯催助藥力大汗出為度其疾立愈不過二服荊黃湯治風熱結滯生疔瘡荊芥穗五錢大黃二錢五分上水一盞半煎服追疔奪命湯羌活獨活青皮防風黃連赤芍細辛甘草節蟬殼殭蠶連翹加荷連澄蘭金銀花有膿加何首烏白芷要利加青木香大黃梔子左脅加木瓜上銼每服五錢加澤蘭金銀花各一兩生薑十片同藥擂爛好酒煎之熱服後再加水酒煎服汗出為度病減後加大黃二錢利一二行去餘毒若心煩嘔吐加甘草節豆粉酸漿水下若嘔逆噁心加乳香豆粉甘草紫金錠好見痰門治各樣疔瘡神效方五月五日午時取艾搗如泥陰乾遇有疔時將疔頭剪刀剪去瘡頂敷上藥三五日好痂待自落忌發物如瘡頭小以針撥開敷一方治疔瘡用針刀鏇破頭以蟾酥敷之後用緑豆野菊花末酒調飲醉睡覺即痛定熱除不必去疔自愈一方治金絲瘡俗呼紅線疔大小不一上下行走行至心即死可於瘡頭盡處用針刺出血嚼浮萍根